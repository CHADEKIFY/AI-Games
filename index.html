<title>3D Print Craft Simulator</title>
<style>
:root{
  --bg:#0c0f14; --panel:#151a22; --panel2:#1b2230; --edge:#242e3e;
  --txt:#e9eef5; --dim:#8fa0b6; --faint:#5b6a80;
  --hot:#ff8c2a; --hot2:#ffb066; --teal:#35d0c0; --good:#57e389; --bad:#ff5563; --warn:#ffd166;
  --r:14px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:manipulation;}
html,body{margin:0; padding:0; background:var(--bg); color:var(--txt);
  font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; overscroll-behavior:none;}
body{padding-bottom:24px; min-height:100vh;}
.mono{font-family:ui-monospace,"SF Mono","Roboto Mono",Menlo,monospace;}
h1,h2,h3{margin:0; letter-spacing:.02em;}
button{font:inherit; color:inherit; background:none; border:none; padding:0;}
canvas{display:block;}

/* ---------- HUD ---------- */
#hud{position:sticky; top:0; z-index:40; display:none; align-items:center; gap:8px;
  padding:10px 12px; background:rgba(12,15,20,.92); backdrop-filter:blur(8px);
  border-bottom:1px solid var(--edge);}
#hud .cash{font-weight:800; font-size:17px; color:var(--good);}
#hud .spool{display:flex; align-items:center; gap:7px; margin-left:auto;
  background:var(--panel); border:1px solid var(--edge); border-radius:99px; padding:6px 12px 6px 8px; font-size:12.5px;}
#hud .dot{width:14px;height:14px;border-radius:50%;border:2px solid #0008; box-shadow:0 0 6px #0006 inset;}
#hud .g{color:var(--dim);}
#hud .diffTag{font-size:10px; font-weight:800; letter-spacing:.08em; color:var(--hot);
  border:1px solid var(--hot); border-radius:6px; padding:2px 6px; text-transform:uppercase;}

/* ---------- Screens ---------- */
.scr{display:none; padding:14px 14px 30px; max-width:560px; margin:0 auto;}
.scr.on{display:block;}
.card{background:var(--panel); border:1px solid var(--edge); border-radius:var(--r); padding:14px; margin-bottom:12px;}
.card.tap:active{background:var(--panel2);}
.row{display:flex; align-items:center; gap:10px;}
.grow{flex:1; min-width:0;}
.sub{color:var(--dim); font-size:12.5px; line-height:1.45;}
.tiny{color:var(--faint); font-size:11px;}
.right{text-align:right;}
.sep{height:1px; background:var(--edge); margin:12px 0;}

.btn{display:block; width:100%; text-align:center; font-weight:800; font-size:15px;
  padding:14px; border-radius:12px; background:var(--panel2); border:1px solid var(--edge); cursor:pointer;}
.btn:active{transform:scale(.985);}
.btn.hot{background:linear-gradient(180deg,#ff9a3d,#f07b12); color:#1a0e00; border:none; box-shadow:0 4px 16px #f07b1240;}
.btn.teal{background:linear-gradient(180deg,#43e0cf,#1fb3a4); color:#00201c; border:none;}
.btn.ghost{background:none;}
.btn.sm{padding:9px 12px; font-size:13px; width:auto; display:inline-block;}
.btn.danger{color:var(--bad); border-color:#ff556344;}
.btn[disabled]{opacity:.4; pointer-events:none;}
.btnrow{display:flex; gap:10px;}
.btnrow .btn{flex:1;}

.head{display:flex; align-items:center; gap:10px; margin:2px 0 14px;}
.head .back{width:40px;height:40px;border-radius:11px;background:var(--panel);border:1px solid var(--edge);

.head .sub{margin-top:2px;}

.chip{display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:700; color:var(--dim);
  background:var(--panel2); border:1px solid var(--edge); border-radius:99px; padding:4px 9px; margin:2px 3px 0 0;}
.chip.warn{color:var(--warn); border-color:#ffd16633;}
.chip.bad{color:var(--bad); border-color:#ff556333;}

.selbtn:after{content:"▾"; margin-left:auto; color:var(--dim);}

  position:relative; flex:none; cursor:pointer; transition:background .15s;}
.tog:before{content:""; position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:50%;

.progress i{display:block; height:100%; background:linear-gradient(90deg,var(--hot),var(--hot2)); width:0%; transition:width .3s linear;}

.miniBody{position:absolute; left:12px; right:12px; bottom:16px; background:var(--panel);
  border:2px solid var(--warn); border-radius:18px; padding:16px; animation:up .15s ease-out; box-shadow:0 -10px 40px #000a;}
.miniBody h3{color:var(--warn); font-size:15px; display:flex; gap:8px; align-items:center;}
.miniBody .timer{height:5px; background:var(--panel2); border-radius:99px; margin:10px 0; overflow:hidden;}
.miniBody .timer i{display:block; height:100%; background:var(--warn); width:100%;}
.bigTap{width:130px; height:130px; margin:14px auto; border-radius:50%; background:radial-gradient(circle at 35% 30%,#ffb066,#c25a00);
  color:#200f00; font-weight:900; font-size:15px; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 24px #f07b1250;}
.bigTap:active{transform:scale(.93);}
.zone{position:relative; height:34px; border-radius:10px; background:var(--panel2); margin:12px 0; overflow:hidden;}
.zone .green{position:absolute; top:0; bottom:0; background:#57e38933; border-left:2px solid var(--good); border-right:2px solid var(--good);}
.zone .needle{position:absolute; top:0; bottom:0; width:4px; background:var(--hot); border-radius:2px;}

/* ---------- Inspection ---------- */
#gradeBig{font-size:52px; font-weight:900; text-align:center; margin:6px 0 0;}

  border-radius:12px; padding:11px 12px; margin-bottom:8px; animation:up .2s ease-out;}

.artTag.okk{border-color:#57e38933;}
.artTag.okk .ded{color:var(--good);}

.toast{background:var(--panel2); border:1px solid var(--edge); border-radius:12px; padding:11px 16px;
  font-size:13.5px; font-weight:700; box-shadow:0 8px 30px #000a; animation:up .2s ease-out; max-width:88%;}
.toast.ach{border-color:var(--hot); color:var(--hot2);}

.perfectBanner{text-align:center; padding:14px; border-radius:14px; margin-bottom:12px;
  background:linear-gradient(135deg,#f07b1225,#35d0c025); border:1px solid var(--hot); color:var(--hot2);
  font-weight:900; font-size:18px; letter-spacing:.05em; animation:pulse 1.2s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1)} 50%{transform:scale(1.03)}}
.shelfMini{display:flex; gap:8px; overflow-x:auto; padding:4px 0;}
.shelfMini .it{flex:none; width:72px; text-align:center; font-size:10px; color:var(--dim);}
.shelfMini canvas{width:72px; height:60px; background:var(--panel2); border-radius:9px; border:1px solid var(--edge);}
@media (prefers-reduced-motion: reduce){*{animation:none!important; transition:none!important;}}
.bar{height:8px;border-radius:5px;background:#0d1119;border:1px solid var(--edge);overflow:hidden;margin-top:5px}
.bar i{display:block;height:100%;border-radius:5px;background:var(--good);transition:width .3s}
.bar.warn i{background:var(--warn)}.bar.bad i{background:var(--bad)}
#ticker{font:600 11.5px ui-monospace,monospace;color:var(--warn);min-height:16px;margin-top:6px;text-align:center}
@keyframes pulseB{0%,100%{box-shadow:0 0 0 0 #ff556355}50%{box-shadow:0 0 0 8px #ff556300}}
.pulse{animation:pulseB 1.1s infinite;border-color:var(--bad)!important;color:var(--bad)!important}
</style>

<script>
"use strict";
/* ================= UTILS ================= */
const $=s=>document.querySelector(s);
const el=(tag,cls,html)=>{const e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e;};
const clamp=(v,a,b)=>Math.min(b,Math.max(a,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const rnd=(a,b)=>a+Math.random()*(b-a);
const ri=(a,b)=>Math.floor(rnd(a,b+1));
const pick=a=>a[Math.floor(Math.random()*a.length)];
const money=v=>"$"+(Math.round(v*100)/100).toLocaleString();
function fmtH(h){const m=Math.round(h*60); if(m<60)return m+"m"; return Math.floor(m/60)+"h "+(m%60)+"m";}
function fmtS(s){s=Math.max(0,Math.round(s)); const m=Math.floor(s/60); return m+"m "+String(s%60).padStart(2,"0")+"s";}
function haptic(ms){try{if(navigator.vibrate)navigator.vibrate(ms||8);}catch(e){}}
function toast(msg,cls){const t=el("div","toast"+(cls?" "+cls:""),msg); $("#toasts").appendChild(t);
  setTimeout(()=>{t.style.opacity="0"; t.style.transition="opacity .4s";},2600); setTimeout(()=>t.remove(),3100);}
window.addEventListener("error",e=>{try{toast("⚠️ "+e.message);}catch(_){}});
function fitCanvas(c,ratio){const d=Math.min(2,window.devicePixelRatio||1); const w=c.clientWidth||320; const h=Math.round(w*ratio);
  c.width=Math.round(w*d); c.height=Math.round(h*d); c.style.height=h+"px";
  const x=c.getContext("2d"); x.setTransform(d,0,0,d,0,0); return {x,w,h};}

/* ================= AUDIO ================= */
const Au={ctx:null, master:null, fan:null, step:null, stepG:null, on:true,
  boot(){if(this.ctx)return; try{this.ctx=new (window.AudioContext||window.webkitAudioContext)();
    this.master=this.ctx.createGain(); this.master.gain.value=.5; this.master.connect(this.ctx.destination);}catch(e){this.on=false;}},
  env(freq,type,dur,vol,slide){if(!this.on)return; this.boot(); if(!this.ctx)return;
    const t=this.ctx.currentTime, o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type=type; o.frequency.setValueAtTime(freq,t); if(slide)o.frequency.exponentialRampToValueAtTime(slide,t+dur);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(.0001,t+dur);
    o.connect(g); g.connect(this.master); o.start(t); o.stop(t+dur+.02);},
  click(){this.env(1800,"square",.03,.08);},
  tick(){this.env(2400,"square",.02,.05);},
  pop(){this.env(500,"sine",.09,.15,900);},
  bad(){this.env(220,"sawtooth",.28,.16,110);},
  cash(){this.env(880,"sine",.09,.14); setTimeout(()=>this.env(1320,"sine",.14,.14),90);},
  sting(){const n=[523,659,784,1047]; n.forEach((f,i)=>setTimeout(()=>this.env(f,"triangle",.35,.16),i*110));},
  warn(){this.env(700,"square",.12,.12); setTimeout(()=>this.env(700,"square",.12,.12),170);},
  startPrint(){if(!this.on)return; this.boot(); if(!this.ctx||this.fan)return;
    const c=this.ctx, len=2*c.sampleRate, buf=c.createBuffer(1,len,c.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*.4;
    const src=c.createBufferSource(); src.buffer=buf; src.loop=true;
    const f=c.createBiquadFilter(); f.type="lowpass"; f.frequency.value=420;
    const g=c.createGain(); g.gain.value=.05;
    src.connect(f); f.connect(g); g.connect(this.master); src.start(); this.fan={src,g};
    const o=c.createOscillator(); o.type="sawtooth"; o.frequency.value=90;
    const og=c.createGain(); og.gain.value=0; o.connect(og); og.connect(this.master); o.start();
    this.step=o; this.stepG=og;},
  setStepper(speedNorm,moving){if(!this.step)return;
    this.step.frequency.setTargetAtTime(70+speedNorm*160,this.ctx.currentTime,.05);
    this.stepG.gain.setTargetAtTime(moving?.03:.0,this.ctx.currentTime,.06);},
  stopPrint(){if(this.fan){try{this.fan.src.stop(); this.step.stop();}catch(e){} this.fan=null; this.step=null; this.stepG=null;}}
};
document.addEventListener("pointerdown",()=>Au.boot(),{once:true});

/* ================= STORAGE (persists inside Claude; in-memory fallback elsewhere) ================= */
/* ================= PERSISTENT STORAGE =================
   Layered so progress survives everywhere this file is opened:
     1. window.storage  — Claude's artifact viewer
     2. localStorage    — a downloaded/standalone copy (incl. Add to Home screen)
     3. IndexedDB       — durable mirror, survives cache clearing better
     4. memory          — last resort so the game still runs
   Every write goes to every backend available; reads take the first hit. */
const Store=(()=>{
 const mem=Object.create(null);
 let cloud=false, ls=null, db=null, dbTried=false;
 try{cloud=!!(window.storage&&typeof window.storage.get==="function");}catch(e){cloud=false;}
 try{const t="__pcs_probe__"; window.localStorage.setItem(t,"1"); window.localStorage.removeItem(t);
     ls=window.localStorage;}catch(e){ls=null;}

 function openDB(){if(dbTried)return Promise.resolve(db); dbTried=true;
  return new Promise(res=>{try{
    if(!window.indexedDB)return res(null);
    const rq=indexedDB.open("printcraft",1);
    rq.onupgradeneeded=()=>{const d=rq.result; if(!d.objectStoreNames.contains("kv"))d.createObjectStore("kv");};
    rq.onsuccess=()=>{db=rq.result; res(db);};
    rq.onerror=()=>res(null);
    setTimeout(()=>res(db),1200);
   }catch(e){res(null);}});}
 async function dbGet(k){const d=await openDB(); if(!d)return null;
  return new Promise(res=>{try{const r=d.transaction("kv","readonly").objectStore("kv").get(k);
    r.onsuccess=()=>res(r.result===undefined?null:r.result); r.onerror=()=>res(null);}catch(e){res(null);}});}
 async function dbSet(k,v){const d=await openDB(); if(!d)return;
  try{const st=d.transaction("kv","readwrite").objectStore("kv");
   if(v===null)st.delete(k); else st.put(v,k);}catch(e){}}

 // ask the browser to keep this data instead of evicting it under pressure
 try{if(navigator.storage&&navigator.storage.persist)navigator.storage.persist().catch(()=>{});}catch(e){}

 const mode=cloud?"cloud":ls?"local":"memory";
 return {
  mode:mode,
  durable:cloud||!!ls,
  hasLocal:!!ls,
  async get(k){
   if(mem[k]!==undefined)return mem[k];
   if(cloud){try{const r=await window.storage.get(k);
     if(r&&r.value){const v=JSON.parse(r.value); mem[k]=v; return v;}}catch(e){}}
   if(ls){try{const s=ls.getItem(k);
     if(s!=null){const v=JSON.parse(s); mem[k]=v; return v;}}catch(e){}}
   try{const v=await dbGet(k); if(v!=null){mem[k]=v; return v;}}catch(e){}
   return null;},
  async set(k,v){
   mem[k]=v;
   let j=null; try{j=JSON.stringify(v);}catch(e){return;}
   if(ls){try{if(v===null)ls.removeItem(k); else ls.setItem(k,j);}catch(e){}}
   if(cloud){try{await window.storage.set(k,j);}catch(e){}}
   dbSet(k,v);},
  // synchronous best-effort write, for page-hide moments
  flush(k,v){mem[k]=v;
   if(ls){try{ls.setItem(k,JSON.stringify(v));}catch(e){}}
   dbSet(k,v);}
 };})();
</script>
<script>
"use strict";
/* ==========================================================================
   VERSION & UPDATES  —  edit this block when you ship a new build
   --------------------------------------------------------------------------
   1. Bump GAME_VERSION.
   2. Add an entry to the TOP of CHANGELOG.
   Players automatically get a "What's New" screen the first time they open
   the new version, however that new file reached them.

   UPDATE_URL is optional. Point it at a small JSON file you host, like:
     { "version": "3.3.0",
       "url": "https://yoursite.com/printcraft.html",
       "notes": ["Fixed the flow test", "Added two new prints"] }
   When a player opens the game online, it quietly checks that file and shows
   an update banner if your hosted version is newer. Left empty, nothing is
   ever requested and the game stays completely network-free.
   ========================================================================== */
const GAME_VERSION="3.2.0";
const UPDATE_URL="";   // e.g. "https://yoursite.com/printcraft-version.json"

const CHANGELOG=[
 {v:"3.2.0",date:"2026-07-23",title:"Saves, Offline & Updates",notes:[
  "Progress now saves properly on any device — closing the game no longer wipes your shop.",
  "Added save backup and restore, so you can move your shops to another phone.",
  "The game installs to your home screen and plays fully offline.",
  "Added automatic patch notes whenever the game updates."]},
 {v:"3.1.0",date:"2026-07-22",title:"Completion, Badges & New Content",notes:[
  "Every difficulty now tracks a completion percentage across seven requirements.",
  "Reach 100% to earn a badge, a level, and Badge Points — then the shop resets for a harder run.",
  "Added the Badge Store, with points locked to the profile that earned them.",
  "New prints: tolerance test, cable clips, hex bins, articulated fish, Voronoi shade, bust.",
  "New filaments: dual-colour, gradient, tri-silk, glitter, glow-in-the-dark, thermochromic, marble.",
  "New machine: the enclosed PrintCraft Pro CoreXY, with better base stats.",
  "Achievements expanded from 32 to 52."]},
 {v:"3.0.0",date:"2026-07-22",title:"The Realism Overhaul",notes:[
  "Removed the minigames. Faults are now handled with real actions: cold pull, untangle, swap, live tuning.",
  "Added a 30-entry defect codex with real causes and fixes, plus paid research to identify them.",
  "Machine parts wear out over print hours — nozzle, PTFE, belts, lubrication, bed film, PID.",
  "Filament absorbs moisture over real time; drying and dry boxes now matter.",
  "Per-filament calibration that saves tuned temperature, flow and retraction profiles.",
  "Every model now has its own real-world setting rules."]}
];

/* ---- update plumbing (all of it fails silently with no connection) ---- */
let pendingUpdate=null;
function verCmp(a,b){const A=String(a).split(".").map(Number),B=String(b).split(".").map(Number);
 for(let i=0;i<Math.max(A.length,B.length);i++){const x=A[i]||0,y=B[i]||0; if(x!==y)return x>y?1:-1;}
 return 0;}
async function showWhatsNew(){
 let seen=null; try{seen=await Store.get("pcs2:seenVersion");}catch(e){}
 if(seen===GAME_VERSION)return;
 try{await Store.set("pcs2:seenVersion",GAME_VERSION);}catch(e){}
 if(!seen)return;                                   // first ever run — nothing to announce
 const fresh=CHANGELOG.filter(c=>verCmp(c.v,seen)>0);
 if(!fresh.length)return;
 patchNotesModal(fresh,"Updated to v"+GAME_VERSION);}
function patchNotesModal(entries,heading){
 const body=entries.map(c=>`<div class="card" style="margin-top:8px">
   <b style="font-size:13px">v${c.v}${c.title?" · "+c.title:""}</b>
   <div class="tiny sub" style="margin-top:1px">${c.date||""}</div>
   <ul style="margin:7px 0 0 16px;padding:0">${c.notes.map(n=>`<li class="tiny" style="margin-bottom:4px">${n}</li>`).join("")}</ul>
  </div>`).join("");
 openModal(`<h3>✨ ${heading}</h3>
   <p class="sub">Your saved shops, badges and Badge Points all carry over.</p>
   <div style="max-height:56vh;overflow:auto">${body}</div>
   <button class="btn hot" style="margin-top:12px" onclick="closeModal()">Let's print</button>`);
 try{Au.sting(); haptic(25);}catch(e){}}
async function checkForUpdate(){
 if(!UPDATE_URL)return;
 try{if(navigator.onLine===false)return;}catch(e){}
 try{
  const ctl=new AbortController(); const t=setTimeout(()=>ctl.abort(),6000);
  const r=await fetch(UPDATE_URL,{cache:"no-store",signal:ctl.signal});
  clearTimeout(t);
  if(!r.ok)return;
  const j=await r.json();
  if(!j||!j.version)return;
  if(verCmp(j.version,GAME_VERSION)>0){pendingUpdate=j;
   if(document.getElementById("scr-splash").classList.contains("on"))renderSplash();}
 }catch(e){/* offline, blocked, or no file there — stay quiet */}}
/* When the game is HOSTED at a URL, a service worker gives true auto-update
   plus offline. Harmless (and skipped) when opened as a local file. */
function initServiceWorker(){

/* ---- economy / usage tracking ---- */
function spend(n){S.money-=n; S.stats.spent=(S.stats.spent||0)+n;}
function useIt(k){if(!S.used[k]){S.used[k]=true; persist();}}
function perk(id){return !!(S&&S.bpOwned&&S.bpOwned[id]);}

/* ---- the two machines ---- */
function printerStats(){const pro=!!(S&&S.printer==="pro");
 return {pro:pro,name:pro?"PrintCraft Pro":"PrintCraft SE",
  base:pro?85:70,                       // safe melt-limited speed
  boosted:pro?125:110,                  // with the high-flow hotend
  wear:pro?.8:1,                        // rigid frame, better bearings
  cool:pro?1:0,                         // stock cooling counts as one upgrade step
  stable:pro?1:0};}                     // steadier chamber temps
function coolRank(){return (S.hw.fan?1:0)+printerStats().cool;}
function wearMul(){return DIFF.wearMul*printerStats().wear*(perk("perkWear")?.75:1)*(S.hw.rails?.85:1);}
function moistMul(){return DIFF.moistMul/((S.hw.drybox?3:1)*(perk("perkDry")?2.5:1));}

/* ---- completion tracking ---- */
const MAINT_CORE=["ipa","belts","pid","ztrim","lube","ipabuy"];
const SELLABLE=()=>MODELS.filter(m=>m.cat!=="mod");
function netProfit(sv){const v=sv||S; return Math.round((v.stats.earned||0)-(v.stats.spent||0));}
function netTarget(sv){const v=sv||S; return (NET_BASE[v.diff]||7000)+2000*(v.level||0);}
function completion(sv){const S=sv||window.__S_ref();
 const cats=[];
 const cnt=(o,keys)=>keys.reduce((a,k)=>a+(o[k]?1:0),0);
 // 1 everything purchased
 cats.push({id:"buy",label:"Every filament purchased",
  have:cnt(S.bought,SPOOL_SHOP.map(s=>s.id)),need:SPOOL_SHOP.length});
 // 2 everything upgraded
 cats.push({id:"hw",label:"Every hardware upgrade owned",
  have:cnt(S.hw,HW.map(h=>h.id)),need:HW.length});
 // 3 a 100% on every printable object
 const sell=SELLABLE();
 cats.push({id:"perf",label:"100% scored on every print",
  have:cnt(S.perfected,sell.map(m=>m.id)),need:sell.length});
 // 4 achievements
 cats.push({id:"ach",label:"Every achievement earned",
  have:cnt(S.ach,ACH.map(a=>a.id)),need:ACH.length});
 // 5 everything owned actually used
 const useKeys=SPOOL_SHOP.map(s=>"s_"+s.id).concat(HW.map(h=>"h_"+h.id));
 cats.push({id:"use",label:"Every purchase actually used",
  have:cnt(S.used,useKeys),need:useKeys.length});
 // 6 all maintenance performed (brass/PTFE jobs drop off once superseded)
 const mk=MAINT_CORE.slice();
 if(!S.hw.nozzle)mk.push("nozzle");
 if(!S.hw.allmetal)mk.push("ptfe");
 cats.push({id:"maint",label:"Every maintenance job performed",
  have:Math.min(cnt(S.maintDone,mk),mk.length),need:mk.length});
 // 7 net profit
 cats.push({id:"net",label:"Net profit target",have:Math.max(0,netProfit(S)),need:netTarget(S),money:true});
 let sum=0; cats.forEach(c=>{c.pct=c.need?clamp(c.have/c.need,0,1):1; sum+=c.pct;});
 const pct=sum/cats.length;
 return {pct:pct,pctShown:pct>=1?100:Math.floor(pct*1000)/10,cats:cats,done:cats.every(c=>c.pct>=1)};}

function checkPrestige(){if(!S||sim||prestiging)return; const c=completion(); if(!c.done)return;
 prestiging=true;
 const lvl=(S.level||0)+1, pts=badgeAward();
 S.level=lvl; S.badges=S.badges||[]; S.badges.push({level:lvl,date:Date.now(),diff:S.diff});
 S.bp=(S.bp||0)+pts;
 unlockAch("completionist"); unlockAch("badged");
 if(lvl>=3)unlockAch("levelThree");
 if(lvl>=5)unlockAch("levelFive");
 const carry={level:S.level,badges:S.badges,bp:S.bp,bpOwned:S.bpOwned};
 prestigeCeremony(lvl,pts,()=>{
  const fresh=blankSave(S.diff,carry); S=fresh; prestiging=false; persist();
  renderHUD(); renderMenu(); show("menu");
  toast("Level "+lvl+" · shop reset · next target "+money(netTarget()));});
 persist();}

function storageNote(){

async function exportSaves(){
 const out={game:"3D Print Craft Simulator",format:1,exported:new Date().toISOString(),saves:{}};
 for(const d of DIFFS){const s=await loadSlot(d.id); if(s)out.saves[d.id]=s;}
 const txt=JSON.stringify(out);
 const n=Object.keys(out.saves).length;
 if(!n){toast("No progress to export yet"); return;}
 let downloaded=false;
 try{const blob=new Blob([txt],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download="printcraft-save-"+new Date().toISOString().slice(0,10)+".json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),4000); downloaded=true;}catch(e){}
 openModal(`<h3>💾 Backup saved</h3>
   <p class="sub">${downloaded?"A <b>.json</b> backup file was downloaded ("+n+" shop"+(n===1?"":"s")+"). Keep it somewhere safe — you can restore it on any device."
     :"Copy the text below and keep it somewhere safe."}</p>
   <textarea id="expBox" readonly style="width:100%;height:110px;margin-top:8px;background:#0d1119;color:var(--ink);
     border:1px solid var(--edge);border-radius:8px;padding:8px;font:11px ui-monospace,monospace">${txt.replace(/</g,"&lt;")}</textarea>
   <button class="btn sm teal" id="expCopy" style="margin-top:8px">Copy to clipboard</button>
   <button class="btn sm" style="margin-top:8px" onclick="closeModal()">Done</button>`,
  mc=>{mc.querySelector("#expCopy").addEventListener("click",()=>{
    const b=mc.querySelector("#expBox"); b.select();
    try{navigator.clipboard?navigator.clipboard.writeText(txt):document.execCommand("copy");}
    catch(e){try{document.execCommand("copy");}catch(e2){}}
    Au.pop(); toast("Backup copied");});});}
async function applyImport(txt){
 let data; try{data=JSON.parse(txt);}catch(e){toast("That doesn't look like a backup file"); Au.bad(); return false;}
 const saves=data&&data.saves?data.saves:null;
 if(!saves||typeof saves!=="object"){toast("No shops found in that backup"); Au.bad(); return false;}
 let n=0;
 for(const d of DIFFS){if(saves[d.id]){await Store.set(key(d.id),saves[d.id]); n++;}}
 if(!n){toast("No shops found in that backup"); Au.bad(); return false;}
 Au.cash(); haptic(25); closeModal(); toast("Restored "+n+" shop"+(n===1?"":"s"));
 renderSplash(); return true;}
function importSaves(){
 openModal(`<h3>📂 Restore a backup</h3>
   <p class="sub">This overwrites any shop found in the backup file. Shops not in the file are left alone.</p>
   <input type="file" id="impFile" accept=".json,application/json,text/plain"
     style="width:100%;margin-top:10px;color:var(--sub);font-size:12px">
   <div class="tiny" style="margin:10px 0 4px">…or paste the backup text:</div>
   <textarea id="impBox" placeholder="Paste backup text here" style="width:100%;height:90px;background:#0d1119;color:var(--ink);
     border:1px solid var(--edge);border-radius:8px;padding:8px;font:11px ui-monospace,monospace"></textarea>
   <button class="btn sm hot" id="impGo" style="margin-top:10px">Restore from text</button>
   <button class="btn sm" style="margin-top:8px" onclick="closeModal()">Cancel</button>`,
  mc=>{
   mc.querySelector("#impFile").addEventListener("change",ev=>{
    const f=ev.target.files&&ev.target.files[0]; if(!f)return;
    const r=new FileReader(); r.onload=()=>applyImport(String(r.result));
    r.onerror=()=>toast("Couldn't read that file"); r.readAsText(f);});
   mc.querySelector("#impGo").addEventListener("click",()=>{
    const v=mc.querySelector("#impBox").value.trim();
    if(!v){toast("Paste a backup first"); return;} applyImport(v);});});}

function shade(hex,amt){const n=parseInt(hex.slice(1),16);
 const r=clamp((n>>16)+amt,0,255),g2=clamp(((n>>8)&255)+amt,0,255),b=clamp((n&255)+amt,0,255);
 return "#"+((r<<16|g2<<8|b)>>>0).toString(16).padStart(6,"0");}
function rr(x2,X,Y,W,H,R){x2.beginPath(); if(x2.roundRect)x2.roundRect(X,Y,W,H,R); else x2.rect(X,Y,W,H);}
function drawPrinter(x,w,h,o){o=o||{}; const mods=o.mods||{}; const lit=!!mods.ledBar;
 const pro=!!o.pro, skin=o.skin||null;
 const T=performance.now()/1000;
 x.clearRect(0,0,w,h);
 // room backdrop
 const g=x.createLinearGradient(0,0,0,h);
 g.addColorStop(0,lit?"#16202e":"#0e131b"); g.addColorStop(.75,lit?"#101722":"#0b0f15"); g.addColorStop(1,"#080b10");
 x.fillStyle=g; x.fillRect(0,0,w,h);
 const cx=w/2, bedY=h*.82, frW=Math.min(w*.66,240)*(o.scale||1), frH=Math.min(h*.72,frW*1.05);

 wg.addColorStop(0,lit?"#3a4a6428":"#2a364a1c"); wg.addColorStop(1,"#00000000");
 x.fillStyle=wg; x.fillRect(0,0,w,h);
 // floor + ground shadow
 x.fillStyle="#07090d"; x.fillRect(0,bedY+10,w,h-bedY-10);
 x.strokeStyle="#1c2431"; x.beginPath(); x.moveTo(0,bedY+10.5); x.lineTo(w,bedY+10.5); x.stroke();
 x.save(); x.translate(cx,bedY+12); x.scale(1,.16); x.translate(-cx,-(bedY+12));
 const shg=x.createRadialGradient(cx,bedY+12,4,cx,bedY+12,frW*.62);
 shg.addColorStop(0,"#00000088"); shg.addColorStop(1,"#00000000");
 x.fillStyle=shg; x.beginPath(); x.arc(cx,bedY+12,frW*.62,0,7); x.fill(); x.restore();
 if(lit){const ug=x.createRadialGradient(cx,bedY+10,4,cx,bedY+10,frW*.5);
  ug.addColorStop(0,mods.ledBar+"44"); ug.addColorStop(1,"#00000000");
  x.fillStyle=ug; x.fillRect(cx-frW,bedY+4,frW*2,28);}
 const PAL=skin==="skinCarbon"?["#1b1d22","#3d434e","#1b1d22","#0f1114"]
   :skin==="skinIvory"?["#c9bfa8","#f3ece0","#b8ac93","#8d8168"]

   :["#2b3547","#4a5b78","#2b3547","#1b2230"];
 const metal=(x0,y0,ww,hh)=>{const mg=x.createLinearGradient(x0,0,x0+ww,0);
  mg.addColorStop(0,PAL[0]); mg.addColorStop(.28,PAL[1]); mg.addColorStop(.55,PAL[2]); mg.addColorStop(1,PAL[3]);
  x.fillStyle=mg; x.fillRect(x0,y0,ww,hh);};
 const legW=11;
 // side skirts mod (behind legs)
 if(mods.sideSkirts){x.fillStyle=mods.sideSkirts; x.globalAlpha=.92;
  x.fillRect(cx-frW/2-7,bedY-frH*.58,7,frH*.58); x.fillRect(cx+frW/2,bedY-frH*.58,7,frH*.58);
  x.globalAlpha=.22; x.fillStyle="#ffffff";

 // frame

 const gz=o.gantryY!=null?o.gantryY:bedY-frH*.62;
 const rg=x.createLinearGradient(0,gz-5,0,gz+5);
 rg.addColorStop(0,"#48587a"); rg.addColorStop(.5,"#2e3a52"); rg.addColorStop(1,"#222c40");
 x.fillStyle=rg; x.fillRect(cx-frW/2+legW,gz-5,frW-legW*2,10);
 x.fillStyle="#141a26"; x.fillRect(cx-frW/2+legW,gz-.5,frW-legW*2,1);
 // toolhead
 const tx=o.toolX!=null?o.toolX:cx;
 const hc=mods.toolheadCover||"#5b6c94";
 const hg=x.createLinearGradient(tx-12,0,tx+12,0);
 hg.addColorStop(0,shade(hc,-34)); hg.addColorStop(.35,shade(hc,26)); hg.addColorStop(1,shade(hc,-48));
 rr(x,tx-12,gz-13,24,27,5); x.fillStyle=hg; x.fill(); x.strokeStyle="#00000055"; x.stroke();
 x.fillStyle="#10151f"; x.beginPath(); x.arc(tx,gz,6.5,0,7); x.fill();
 x.strokeStyle="#3c4a66"; x.beginPath(); x.arc(tx,gz,6.5,0,7); x.stroke();
 x.strokeStyle="#2a3346";
 for(let a=0;a<4;a++){x.beginPath(); x.moveTo(tx,gz);
  x.arc(tx,gz,5.5,a*1.5708+T*3,a*1.5708+T*3+.9); x.closePath(); x.stroke();}
 x.fillStyle="#0d1119"; x.beginPath(); x.arc(tx,gz,1.6,0,7); x.fill();
 x.strokeStyle="#7d8dab";
 for(let i=0;i<3;i++){x.beginPath(); x.moveTo(tx-8,gz+15+i*2.4); x.lineTo(tx+8,gz+15+i*2.4); x.stroke();}
 x.fillStyle="#1a2130"; x.fillRect(tx-4.5,gz+14,9,8);
 x.fillStyle="#d8c49a"; x.beginPath();
 x.moveTo(tx-4,gz+22); x.lineTo(tx+4,gz+22); x.lineTo(tx+1.4,gz+27); x.lineTo(tx-1.4,gz+27); x.closePath(); x.fill();
 if(o.hotGlow){const ng=x.createRadialGradient(tx,gz+27,0,tx,gz+27,9);
  ng.addColorStop(0,"#ffb04daa"); ng.addColorStop(.5,"#ff8c2a44"); ng.addColorStop(1,"#00000000");
  x.fillStyle=ng; x.beginPath(); x.arc(tx,gz+27,9,0,7); x.fill();
  x.strokeStyle="#ffffff12"; x.lineWidth=1.4;
  for(let i=0;i<2;i++){const ph=T*2.2+i*2.4; x.beginPath();
   for(let s2=0;s2<=12;s2+=3)x.lineTo(tx+4+i*5+Math.sin(ph+s2*.7)*2.2,gz+22-s2*2.4);
   x.stroke();}
  x.lineWidth=1;}
 // spool assembly
 const sxp=cx+frW/2+17, syp=bedY-frH*.72;
 if(mods.spoolHolder){x.strokeStyle=mods.spoolHolder; x.lineWidth=3;
  x.beginPath(); x.moveTo(cx+frW/2-2,syp+20); x.lineTo(sxp,syp+7); x.stroke(); x.lineWidth=1;}
 if(o.spool){
  const fg=x.createRadialGradient(sxp-4,syp-4,2,sxp,syp,15);
  fg.addColorStop(0,"#39435a"); fg.addColorStop(1,"#1c2331");
  x.fillStyle=fg; x.beginPath(); x.arc(sxp,syp,15,0,7); x.fill();
  x.strokeStyle="#4b5a78"; x.beginPath(); x.arc(sxp,syp,15,0,7); x.stroke();
  x.strokeStyle=o.spool; x.lineWidth=6.5; x.beginPath(); x.arc(sxp,syp,10.5,0,7); x.stroke();
  x.strokeStyle=shade(o.spool,-42); x.lineWidth=1;
  for(const r3 of[8,10,12]){x.beginPath(); x.arc(sxp,syp,r3,0,7); x.stroke();}
  x.strokeStyle="#ffffff2e"; x.lineWidth=2; x.beginPath(); x.arc(sxp,syp,11,3.6,4.6); x.stroke(); x.lineWidth=1;
  x.fillStyle="#0e1420"; x.beginPath(); x.arc(sxp,syp,4.5,0,7); x.fill();
  x.strokeStyle="#3c4a66"; x.beginPath(); x.arc(sxp,syp,4.5,0,7); x.stroke();
  if(mods.filamentGuide){x.strokeStyle=mods.filamentGuide; x.lineWidth=2.2;}
  else{x.strokeStyle=o.spool; x.lineWidth=1.6;}
  x.beginPath(); x.moveTo(sxp-7,syp+11); x.quadraticCurveTo(tx+34,gz-44,tx+3,gz-13); x.stroke(); x.lineWidth=1;}
 // purge bucket + tool holder mods
 if(mods.purgeBucket){const pb=x.createLinearGradient(0,bedY-17,0,bedY-6);
  pb.addColorStop(0,shade(mods.purgeBucket,20)); pb.addColorStop(1,shade(mods.purgeBucket,-25));
  x.fillStyle=pb; x.beginPath(); x.moveTo(cx-frW/2+13,bedY-17); x.lineTo(cx-frW/2+29,bedY-17);
  x.lineTo(cx-frW/2+27,bedY-6); x.lineTo(cx-frW/2+15,bedY-6); x.closePath(); x.fill();}
 if(mods.toolHolder){x.fillStyle=mods.toolHolder; rr(x,cx-frW/2-9,bedY-frH*.42,8,27,2); x.fill();
  x.strokeStyle="#c9d4e6"; x.beginPath(); x.moveTo(cx-frW/2-5,bedY-frH*.42+4); x.lineTo(cx-frW/2-5,bedY-frH*.42-7); x.stroke();
  x.fillStyle="#8899b5"; x.fillRect(cx-frW/2-7,bedY-frH*.42+9,4,2);}
 x.textAlign="left"; x.lineWidth=1;
 return {cx,bedY,frW,frH};
}

<script>
"use strict";
/* ================= SHEET / MODAL HELPERS ================= */
function openSheet(build){const s=$("#sheet"); $("#sheetC").innerHTML=""; build($("#sheetC")); s.classList.add("on");}
function closeSheet(){$("#sheet").classList.remove("on");}
$("#sheet .dimmer").addEventListener("click",closeSheet);
function openModal(html,after){$("#modalC").innerHTML=html; $("#modal").classList.add("on"); if(after)after($("#modalC"));}
function closeModal(){$("#modal").classList.remove("on");}
$("#modal .dimmer").addEventListener("click",closeModal);

/* ================= ORDERS / ACHIEVEMENTS ================= */
function ensureOrders(){const today=new Date().toDateString();
 if(S.ordersDay===today&&S.orders.length)return;
 S.ordersDay=today; S.orders=[];
 const nOrders=perk("perkOrder")?4:3;
 const prods=MODELS.filter(m=>m.cat==="prod");
 for(let i=0;i<nOrders;i++){const m=pick(prods);
  const mats=["pla","pla","pla","silk","matte","petg","abs","tpu"]; const mat=pick(mats);
  const colored=Math.random()<.5; const sp=colored?pick(SPOOL_SHOP.filter(s=>s.mat===mat)):null;
  S.orders.push({model:m.id,mat,shop:sp?sp.id:null,bonus:Math.round(m.pay*.6+10),done:false});}
 persist();}
function unlockAch(id){if(S.ach[id])return; S.ach[id]=true; persist();
 const a=ACH.find(a=>a.id===id); Au.sting(); haptic(30); toast("🏆 Achievement: "+a.name,"ach");}
function checkAchGlobal(){if(S.stats.prints>=1)unlockAch("first");
 if(S.stats.prints>=25)unlockAch("grinder");
 if(S.stats.prints>=100)unlockAch("printFarm");
 if(S.stats.earned>=1000)unlockAch("moneybags");
 if(S.stats.earned>=2500)unlockAch("smallBiz");
 if(S.stats.earned>=10000)unlockAch("empire");
 if(S.stats.grams>=1000)unlockAch("kiloClub");
 if((S.stats.orders||0)>=5)unlockAch("orderUp");
 if((S.stats.orders||0)>=20)unlockAch("supplier");
 if(S.shelf.length>=6)unlockAch("shelf6");
 if(S.shelf.length>=12)unlockAch("shelf12");
 if(HW.every(h=>S.hw[h.id]))unlockAch("fullRig");
 if(Object.keys(S.mods).length>=4)unlockAch("modShop");
 if(MODS.every(m2=>S.mods[m2.id]))unlockAch("theWorks");
 if(["benchy","cube","overhang","temptower","retract","flowcube","tolerance"].every(k2=>S.calib&&S.calib[k2]))unlockAch("labRat");
 if(S.machine&&S.machine.hours>=100)unlockAch("highMileage");
 if(S.machine&&S.machine.hours>=300)unlockAch("ironHorse");
 if(S.hw.sensor&&S.hw.ups)unlockAch("preparedness");
 let profCount=0; for(const k in S.profiles)profCount+=S.profiles[k].length;
 if(profCount>=3)unlockAch("tuner");
 if((S.badges||[]).length>=1)unlockAch("badged");
 checkPrestige();}

/* ================= MAIN MENU ================= */
function drawModelThumb(cv,m,color){const {x,w,h}=fitCanvas(cv,60/72);
 x.clearRect(0,0,w,h); const K=Math.min((h-14)/m.hMM,(w-16)/m.wMM);
 const bedY=h-8, cx2=w/2;
 x.strokeStyle="#3a475c"; x.beginPath(); x.moveTo(6,bedY); x.lineTo(w-6,bedY); x.stroke();
 x.fillStyle=color||"#8f959e"; x.strokeStyle="#0006";
 const P=new Path2D(); const pts=m.prof;
 const wAt=t=>{for(let i=1;i<pts.length;i++){if(t<=pts[i][0]){const a=pts[i-1],b=pts[i];
   const f=(t-a[0])/Math.max(.0001,b[0]-a[0]); return lerp(a[1],b[1],f);}} return pts[pts.length-1][1];};
 const H=m.hMM*K, W2=m.wMM*K/2, off=m.twin?W2*.55:0;
 for(const side of (m.twin?[-1,1]:[0])){
  P.moveTo(cx2+side*off-wAt(0)*W2*(m.twin?.45:1),bedY);
  for(let t=0;t<=1.001;t+=.05)P.lineTo(cx2+side*off-wAt(t)*W2*(m.twin?.45:1),bedY-t*H);
  for(let t=1;t>=-.001;t-=.05)P.lineTo(cx2+side*off+wAt(t)*W2*(m.twin?.45:1),bedY-t*H);
  P.closePath();}
 x.fill(P); x.stroke(P);}
function calUnlockNames(id){return SETTINGS.filter(s=>s.unlockBy===id).map(s=>s.label).join(" · ");}
function modelUnlocked(m){if(!m.req)return true;
 if(m.req.prints&&S.stats.prints<m.req.prints)return false;
 if(m.req.perfects&&S.stats.perfects<m.req.perfects)return false; return true;}
function reqText(m){const parts=[]; if(m.req.prints)parts.push(m.req.prints+" prints");
 if(m.req.perfects)parts.push(m.req.perfects+" perfect"); return "Unlocks at "+parts.join(" + ");}

function renderMenu(){const c=$("#scr-menu"); c.innerHTML=""; tickWorld(); ensureOrders(); renderHUD();
 const roomCard=el("div","card"); roomCard.style.padding="10px";
 roomCard.innerHTML=`<canvas id="roomCv" style="width:100%"></canvas>
   <div class="tiny" style="text-align:center;margin-top:6px">The print room · ${Object.keys(S.mods).length} mod${Object.keys(S.mods).length===1?"":"s"} installed</div>`;
 c.appendChild(roomCard);
 // showcase shelf
 if(S.shelf.length){const sh=el("div","card");
  sh.innerHTML=`<b style="font-size:13px">🏆 Showcase Shelf</b><div class="shelfMini" id="shelfRow" style="margin-top:8px"></div>`;
  c.appendChild(sh);
  const row=sh.querySelector("#shelfRow");
  S.shelf.slice(-8).reverse().forEach(it=>{const d=el("div","it"); const cv=document.createElement("canvas");
   d.appendChild(cv); d.appendChild(el("div","", (MODEL[it.model]?MODEL[it.model].name:it.model)+"<br>"+it.grade+"%"));
   row.appendChild(d); requestAnimationFrame(()=>drawModelThumb(cv,MODEL[it.model]||MODELS[0],it.color));});}
 // buttons
 const b1=el("button","btn hot","🖨️ Print a Model"); b1.addEventListener("click",()=>{Au.click(); renderCatalog("cal");});
 const grid=el("div","btnrow"); grid.style.marginTop="10px";
 const b2=el("button","btn","🛒 Shop"); b2.addEventListener("click",()=>{Au.click(); renderShop("fil");});
 const b3=el("button","btn","🧵 Filament"); b3.addEventListener("click",()=>{Au.click(); filamentSheet();});
 const b4=el("button","btn","📊 Stats"); b4.addEventListener("click",()=>{Au.click(); renderStats();});
 grid.append(b2,b3,b4);
 const grid2=el("div","btnrow"); grid2.style.marginTop="8px";
 const b5=el("button","btn","🔧 Maintenance"); b5.addEventListener("click",()=>{Au.click(); renderMaint();});
 const b6=el("button","btn","📖 Field Guide"); b6.addEventListener("click",()=>{Au.click(); renderGuide();});
 grid2.append(b5,b6);
 const grid3=el("div","btnrow"); grid3.style.marginTop="8px";
 const b7=el("button","btn","📈 Completion"); b7.addEventListener("click",()=>{Au.click(); renderComplete();});
 const b8=el("button","btn","🏅 Badge Store"); b8.addEventListener("click",()=>{Au.click(); renderBadgeStore();});
 grid3.append(b7,b8);
 c.appendChild(b1); c.appendChild(grid); c.appendChild(grid2); c.appendChild(grid3);
 // completion + prestige strip
 {const comp=completion(); const cp=el("div","card tap");
  cp.innerHTML=`<div class="row"><div class="grow">
    <div class="row"><span class="tiny grow" style="letter-spacing:.16em">SHOP COMPLETION</span>
      <span class="mono tiny" style="color:var(--hot);font-weight:800">${comp.pctShown}%</span></div>
    <div class="bar ${comp.pct<.34?"bad":comp.pct<.75?"warn":""}"><i style="width:${comp.pct*100}%"></i></div>
    <div class="tiny mono" style="margin-top:5px">net ${money(netProfit())} / ${money(netTarget())}${S.bp?" · 🏅 "+S.bp+" pts":""}</div>
   </div>${(S.level||0)?`<div id="menuBadge" style="flex:none;margin-left:9px"></div>`:""}</div>`;
  cp.addEventListener("click",()=>{Au.click(); renderComplete();});
  cp.style.marginTop="10px"; c.appendChild(cp);
  if(S.level){const mb=cp.querySelector("#menuBadge"); if(mb)mb.appendChild(badgeCanvas(S.level,46));}}
 // machine switcher
 if(S.hw.pro){const sw=el("div","card");
  sw.innerHTML=`<div class="row"><div class="grow"><b style="font-size:13px">Active machine</b>
    <div class="tiny" style="margin-top:2px">${printerStats().name} · safe speed ${printerStats().base} mm/s${printerStats().pro?" · rigid frame, stronger stock cooling":""}</div></div></div>`;
  const row=el("div","btnrow"); row.style.marginTop="8px";
  [["se","PrintCraft SE"],["pro","PrintCraft Pro"]].forEach(([id,lab])=>{
   const b=el("button","btn sm"+(S.printer===id?" teal":""),lab);
   b.addEventListener("click",()=>{S.printer=id; if(id==="pro")useIt("h_pro"); persist(); Au.pop(); haptic(10); renderMenu();});
   row.appendChild(b);});
  sw.appendChild(row); c.appendChild(sw);}
 const M=mach(); const warns=[];
 if(M.bedClean<50)warns.push("🧽 bed dirty");
 if(M.belts<40)warns.push("🎸 belts slack");
 if(M.lube<30)warns.push("🛢️ rails dry");
 if(!S.hw.allmetal&&M.ptfe<40)warns.push("🩹 PTFE worn");
 if(!S.hw.nozzle&&M.nozzleWear>=60)warns.push("⚠️ nozzle worn");
 if(!M.pid)warns.push("🌡️ PID untuned");
 if(S.spools.some(s2=>(s2.moist||0)>=35))warns.push("💧 wet filament");
 if(warns.length){const wcd=el("div","card tap sub");
  wcd.innerHTML="🔧 Machine needs attention: "+warns.join(" · ");
  wcd.addEventListener("click",()=>{Au.click(); renderMaint();});
  wcd.style.marginTop="10px"; c.appendChild(wcd);}
 // daily orders
 const oc=el("div","card"); oc.style.marginTop="12px";
 oc.innerHTML=`<b style="font-size:13px">📦 Today's customer orders</b><div class="sub" style="margin:4px 0 8px">Deliver a matching print at 70%+ quality for bonus pay. Resets daily.</div>`;
 S.orders.forEach(o=>{const m=MODEL[o.model]; const sp=o.shop?SPOOL_SHOP.find(s=>s.id===o.shop):null;
  const row=el("div","row"); row.style.cssText="padding:8px 0;border-top:1px solid var(--edge)";
  row.innerHTML=`<div class="grow"><b style="font-size:13px">${m.name}</b>
    <div class="tiny">${sp?sp.name:FIL[o.mat].name}${sp?"":" (any color)"}</div></div>
    <div class="${o.done?'sub':'pricetag'}">${o.done?"✓ done":"+"+money(o.bonus)}</div>`;
  oc.appendChild(row);});
 c.appendChild(oc);
 const sw=el("button","btn ghost sub","⇄ Switch shop / difficulty"); sw.style.marginTop="4px";
 sw.addEventListener("click",()=>{Au.click(); renderSplash();});
 c.appendChild(sw);
 show("menu");
 requestAnimationFrame(()=>{const cv=$("#roomCv"); const {x,w,h}=fitCanvas(cv,.62);
  const modColors={}; for(const id in S.mods)modColors[id]=S.mods[id];
  drawPrinter(x,w,h,{mods:modColors,spool:spool()?spool().color:null,
   pro:printerStats().pro,skin:perk("skinCarbon")?"skinCarbon":perk("skinIvory")?"skinIvory":null});});
}

/* ================= FILAMENT SHEET ================= */
function filamentSheet(){
 if(!S.spools.length&&S.money<25){
  S.spools.push({shop:"pla_gray",mat:"pla",name:"Recycled Gray PLA",color:"#7d838c",g:150});
  S.loaded=0; persist(); renderHUD(); toast("The shop takes pity — 150g of recycled scraps.");}
 openSheet(c=>{
 c.appendChild(el("h3",null,"Load filament"));
 if(!S.spools.length)c.appendChild(el("div","sub","No spools in inventory. Visit the shop."));
 S.spools.forEach((sp,i)=>{const o=el("div","opt"+(i===S.loaded?" on":""));
  const mo=Math.round(sp.moist||0);
  const moChip=DIFF.moistMul>0?`<span class="chip ${mo>=65?"bad":mo>=35?"warn":"good"}" style="margin-left:6px">💧${mo}%</span>`:"";
  o.innerHTML=`<span class="dot" style="width:16px;height:16px;border-radius:50%;background:${sp.color};border:2px solid #0008"></span>
   <span class="grow">${sp.name}${moChip}<div class="tiny">${FIL[sp.mat].name} · ${FIL[sp.mat].nt[0]}–${FIL[sp.mat].nt[1]}°C</div></span>
   <span class="mono sub">${Math.max(0,Math.round(sp.g))}g</span>`;
  const prof=el("button","chip","⚙︎ profile");
  prof.addEventListener("click",ev=>{ev.stopPropagation(); Au.click(); filProfileModal(sp);});
  o.appendChild(prof);
  o.addEventListener("click",()=>{S.loaded=i; persist(); Au.pop(); haptic(); renderHUD(); closeSheet();
   if($("#scr-slicer").classList.contains("on")&&curModel)renderSlicer(curModel);});
  c.appendChild(o);});
 const b=el("button","btn sm","+ Buy spools in the Shop"); b.style.marginTop="10px";
 b.addEventListener("click",()=>{closeSheet(); renderShop("fil");}); c.appendChild(b);});}

function filProfileModal(sp){const p=fpFor(sp.mat),f=FIL[sp.mat];
 const kv=(lab,known,val,unit)=>`<div class="row"><span class="grow sub">${lab}</span>
   <b class="mono" style="font-size:12px">${known?val+unit:"not tuned"}</b></div>`;
 openModal(`<h3>🧵 ${f.name} — filament profile</h3>
  <p class="sub">Saved per material on this save. Calibration tests write tuned values here; the slicer auto-fills from them, so your tuning is never lost.</p>
  ${kv("Sweet-spot temp (Temp Tower)",p.known.t,p.set.t,"°C")}
  ${kv("Flow rate (Flow Test)",p.known.f,p.set.f,"%")}
  ${kv("Retraction (Retraction Test)",p.known.r,p.set.r," mm")}
  <div class="row" style="margin-top:8px"><span class="grow sub">Moisture</span><b class="mono">${Math.round(sp.moist||0)}%</b></div>
  <div class="tiny" style="margin-top:4px">Hygroscopicity: ${f.hygro>=2?"HIGH":f.hygro>=1?"moderate":"low"} · dries at ${f.dryT}°C${S.hw.drybox?" · dry box slowing absorption 3×":""}</div>
  <div id="dryBtnRow" style="margin-top:12px"></div>
  <button class="btn sm" style="margin-top:8px" onclick="closeModal()">Close</button>`,
  mc=>{const row=mc.querySelector("#dryBtnRow");
   if(S.hw.dryer){const b=el("button","btn sm teal","🔥 Dry this spool ("+f.dryT+"°C cycle)");
    b.addEventListener("click",()=>{sp.moist=0; persist(); Au.pop(); haptic(12);
     unlockAch("boneDry"); toast("Spool dried to 0% — crackle-free"); closeModal();
     if($("#sheet").classList.contains("on"))filamentSheet();});
    row.appendChild(b);}
   else row.appendChild(el("div","tiny","🔒 Buy the Filament Dryer to bake moisture back out."));});}
/* ================= CATALOG ================= */
function renderCatalog(tab){const c=$("#scr-catalog"); c.innerHTML="";
 const head=el("div","head"); const back=el("button","back","‹");
 back.addEventListener("click",()=>{Au.click(); renderMenu();});
 head.append(back,el("div","grow","<h2>Model Catalog</h2><div class='sub'>Test prints pay nothing — ace them at 80%+ to unlock slicer settings.</div>"));
 c.appendChild(head);
 const tabs=el("div","tabs");
 [["cal","Calibration"],["prod","Products"],["mod","Printer Mods"]].forEach(([id,lab])=>{
  const b=el("button",id===tab?"on":"",lab); b.addEventListener("click",()=>{Au.tick(); renderCatalog(id);}); tabs.appendChild(b);});
 c.appendChild(tabs);
 MODELS.filter(m=>m.cat===tab).forEach(m=>{
  const locked=!modelUnlocked(m); const installed=m.cat==="mod"&&S.mods[m.modId];
  const card=el("div","card"+(locked?"":" tap")); if(locked)card.style.opacity=.55;
  const est=estimate(m,defaultSettings(m));
  card.innerHTML=`<div class="row"><canvas class="th" style="width:72px;height:60px;flex:none;background:var(--panel2);border-radius:9px;border:1px solid var(--edge)"></canvas>
   <div class="grow"><b style="font-size:14px">${m.name}</b>
    <div class="sub" style="margin-top:3px">${m.desc}</div>
    <div style="margin-top:6px">
      ${m.cat==="cal"?(S.calib[m.id]?`<span class="chip good">✓ mastered</span>`:`<span class="chip">🧪 test · no pay</span>`):m.cat!=="mod"?`<span class="chip good">base ${money(m.pay)}</span>`:installed?`<span class="chip good">Installed</span>`:`<span class="chip">perk mod</span>`}
      <span class="chip">~${fmtH(est.h)} print</span><span class="chip">~${Math.round(est.g)}g</span>
      ${locked?`<span class="chip warn">🔒 ${reqText(m)}</span>`:""}
    </div>
    ${m.cat==="cal"&&!S.calib[m.id]?`<div class="tiny" style="margin-top:6px;color:var(--teal)">🔓 80%+ unlocks: ${calUnlockNames(m.id)}</div>`:""}
    </div></div>`;
  const cv=card.querySelector("canvas");
  requestAnimationFrame(()=>drawModelThumb(cv,m,spool()?spool().color:"#8f959e"));
  if(!locked)card.addEventListener("click",()=>{Au.click(); haptic();
   if(!spool()||spool().g<=0){toast("Load a spool with filament first"); filamentSheet(); return;}
   renderSlicer(m);});
  c.appendChild(card);});
 show("catalog");}

/* ================= SHOP ================= */
function renderShop(tab){const c=$("#scr-shop"); c.innerHTML="";
 const head=el("div","head"); const back=el("button","back","‹");
 back.addEventListener("click",()=>{Au.click(); renderMenu();});
 head.append(back,el("div","grow","<h2>Shop</h2><div class='sub'>Every dollar here was a print that didn't fail.</div>"));
 c.appendChild(head);
 const tabs=el("div","tabs");
 [["fil","Filament"],["hw","Hardware"]].forEach(([id,lab])=>{const b=el("button",id===tab?"on":"",lab);
  b.addEventListener("click",()=>{Au.tick(); renderShop(id);}); tabs.appendChild(b);});
 c.appendChild(tabs);
 if(tab==="fil"){
  SPOOL_SHOP.forEach(it=>{const f=FIL[it.mat]; const need=f.needs&&!S.hw[f.needs];
   const owned=S.spools.filter(s=>s.shop===it.id).reduce((a,s)=>a+s.g,0);
   const card=el("div","card");
   card.innerHTML=`<div class="row"><span class="dot" style="width:20px;height:20px;border-radius:50%;background:${it.color};border:2px solid #0008;flex:none"></span>
    <div class="grow"><b style="font-size:14px">${it.name}</b>
     <div class="tiny" style="margin-top:2px">${f.name} · 1kg spool · ${f.note}</div>
     ${owned?`<div class="tiny mono" style="color:var(--good);margin-top:3px">in stock: ${Math.round(owned)}g</div>`:""}
     ${need?`<div class="lock" style="margin-top:3px">🔒 Requires ${HW.find(h=>h.id===f.needs).name}</div>`:""}</div>
    <button class="btn sm ${need?'':'hot'}" ${need||S.money<it.price?"disabled":""}>${money(it.price)}</button></div>`;
   card.querySelector("button").addEventListener("click",()=>{if(S.money<it.price)return;
    spend(it.price); S.bought[it.id]=true;
    S.spools.push({shop:it.id,mat:it.mat,name:it.name,color:it.color,color2:it.color2,g:1000,moist:0});
    if(S.spools.filter((v,i,a)=>a.findIndex(z=>z.shop===v.shop)===i).length>=8)unlockAch("spoolCollector");
    persist(); Au.cash(); haptic(15); renderHUD(); renderShop("fil"); toast("Loaded into inventory: "+it.name);});
   c.appendChild(card);});
 }else{
  HW.forEach(hw=>{const owned=S.hw[hw.id];
   const card=el("div","card");
   card.innerHTML=`<div class="row"><div class="grow"><b style="font-size:14px">${hw.name}</b>
     <div class="sub" style="margin-top:3px">${hw.desc}</div></div>
     ${owned?`<span class="chip good">Owned</span>`:`<button class="btn sm hot" ${S.money<hw.price?"disabled":""}>${money(hw.price)}</button>`}</div>`;
   if(!owned)card.querySelector("button").addEventListener("click",()=>{if(S.money<hw.price)return;
    spend(hw.price); S.hw[hw.id]=true;
    if(hw.id==="nozzle"){mach().nozzleWear=0; mach().pid=false;}
    if(hw.id==="hotend"||hw.id==="allmetal")mach().pid=false;
    if(hw.id==="abl"){mach().zTrim*=.4;}
    if(hw.id==="pro"){unlockAch("twoMachines"); S.printer="pro"; useIt("h_pro");}
    persist(); Au.cash(); haptic(20); renderHUD(); checkAchGlobal(); renderShop("hw");
    toast(hw.name+" installed on the PrintCraft SE");});
   c.appendChild(card);});
 }
 show("shop");}
</script>
<script>
"use strict";
/* ================= SLICER ================= */
let curModel=null, curSet=null;
function defaultSettings(m){const s={};
 SETTINGS.forEach(d=>s[d.id]=d.def);
 const sp=spool();
 if(sp&&S&&DIFF){const p=fpFor(sp.mat),f=FIL[sp.mat];
  s.nozzleTemp=p.set.t!=null?p.set.t:Math.round((f.nt[0]+f.nt[1])/2/5)*5;
  s.bedTemp=Math.round((f.bt[0]+f.bt[1])/2/5)*5;
  s.fan=Math.round((f.fan[0]+f.fan[1])/2/5)*5;
  if(p.set.f!=null)s.flow=p.set.f;
  s.retraction=p.set.r!=null?p.set.r:f.retr;}
 if(m&&m.id==="planter")s.vase=0;
 if(m&&S&&S.last[m.id])Object.assign(s,S.last[m.id]);
 return s;}
function visibleSetting(s){if(s.onlyTier!==undefined&&s.onlyTier!==tier())return false;
 if(s.unlockBy)return !!(S&&S.calib&&S.calib[s.unlockBy]);
 return s.tier<=tier();}
function filCtx(){const sp=spool()||{mat:"pla"}; const f=Object.assign({_m:sp.mat},FIL[sp.mat]); return f;}
function effective(set){const f=filCtx(); const e={};
 const p=S&&DIFF?fpFor(f._m):{set:{}};
 for(const s of SETTINGS){let v=set[s.id];
  if(!visibleSetting(s)){
   if(s.id==="nozzleTemp"&&p.set.t!=null)v=p.set.t;
   else if(s.id==="flow"&&p.set.f!=null)v=p.set.f;
   else if(s.id==="retraction"&&p.set.r!=null)v=p.set.r;
   else v=(s.auto?s.auto(f):s.def);}
  e[s.id]=v;}
 if(tier()===0)e.adhesionType=set.adhesionOn?2:0;
 e._lh=LH_VALS[e.layerHeight]; return e;}
function estimate(m,set){const e=set._lh?set:effective(set);
 const vase=e.vase===1;
 const infF=vase?.5:(.5+e.infill/100*.9);
 let h=m.baseH*(0.2/e._lh)*infF*Math.pow(50/Math.max(10,e.speed),.7)*(1+(e.walls-1)*.07)*(vase?.55:1);
 if(e.supports>0&&(m.feats.overhangs||m.feats.steep))h*=1.15;
 if(e.fuzzy>0)h*=(e.fuzzy===1?1.05:1.12);
 if(e.adhesionType===3)h*=1.08;
 if(e.slowCool&&e.minLayerTime>8)h*=1.03;
 let g=m.baseG*(vase?.38:(.32+e.infill/100*.8)*(1+(e.walls-1)*.1)*(1+(e.topBottom-1)*.035))*(e.flow/100);
 if(e.supports>0&&(m.feats.overhangs||m.feats.steep))g*=(e.supports===1?1.14:1.09);
 if(e.adhesionType===2)g+=e.brimCount*.28; if(e.adhesionType===3)g*=1.1;
 if(e.ears)g+=1.5; if(e.prime)g+=4;
 return {h,g,e};}
function throttled(fn,ms){let t=0; return(...a)=>{const n=Date.now(); if(n-t>ms){t=n; fn(...a);}};}
const tickTh=throttled(()=>{Au.tick(); haptic(4);},70);

function renderSlicer(m){curModel=m; if(!curSet||curSet._for!==m.id){curSet=defaultSettings(m); curSet._for=m.id;}
 const c=$("#scr-slicer"); c.innerHTML="";
 const head=el("div","head"); const back=el("button","back","‹");
 back.addEventListener("click",()=>{Au.click(); curSet=null; renderCatalog(m.cat);});
 head.append(back,el("div","grow",`<h2>PrintCraftSlicer</h2><div class="sub">${m.name}</div>`));
 const prof=el("button","back","🗂"); prof.title="Profiles";
 prof.addEventListener("click",()=>{Au.click(); profilesModal(m);});
 head.appendChild(prof); c.appendChild(head);
 // filament banner
 const sp=spool(), f=FIL[sp.mat];
 const fb=el("div","card tap");
 fb.innerHTML=`<div class="row"><span class="dot" style="width:18px;height:18px;border-radius:50%;background:${sp.color};border:2px solid #0008;flex:none"></span>
  <div class="grow"><b style="font-size:13.5px">${sp.name} · ${Math.max(0,Math.round(sp.g))}g left</b>
  <div class="tiny">${f.note}</div></div><span class="sub">change ›</span></div>`;
 fb.addEventListener("click",filamentSheet); c.appendChild(fb);
 if(f.needs&&!S.hw[f.needs])c.appendChild(el("div","card","<span class='chip bad'>⚠️ "+HW.find(h=>h.id===f.needs).name+" not installed — this print will suffer</span>"));
 if(sp.mat==="cf"&&!S.hw.nozzle)c.appendChild(el("div","card","<span class='chip bad'>⚠️ Carbon fiber will grind down the brass nozzle</span>"));
 const mw=[],M=mach();
 if((sp.moist||0)>=35)mw.push(["bad","💧 Spool has absorbed moisture ("+Math.round(sp.moist)+"%) — expect popping, strings & weak layers"]);
 if(!S.hw.nozzle&&M.nozzleWear>=60)mw.push(["bad","⚠️ Brass nozzle worn "+Math.round(M.nozzleWear)+"% — under-extrusion until replaced"]);
 if(M.belts<40)mw.push(["warn","🎸 Belts are slack — ringing & dimensional drift"]);
 if(M.lube<30)mw.push(["warn","🛢️ Rails & lead screw are dry — Z-banding"]);
 if(M.bedClean<50)mw.push(["warn","🧽 Bed film building up — adhesion is suffering"]);
 if(!S.hw.allmetal&&M.ptfe<40)mw.push(["warn","🩹 PTFE liner degraded — jams above ~235°C"]);
 if(!M.pid)mw.push(["warn","🌡️ PID not tuned since hotend work — temp swings ±6°"]);
 if(Math.abs(M.zTrim)>.06)mw.push(["warn","↕️ Z-trim is off — run the Flow & First-Layer Test"]);
 if(mw.length){const wc=el("div","card tap"); wc.innerHTML=mw.map(w=>`<div class="chip ${w[0]}" style="margin:2px 4px 2px 0">${w[1]}</div>`).join("");
  wc.addEventListener("click",()=>{Au.click(); renderMaint();}); c.appendChild(wc);}
 if(DIFF.meshBug&&m.meshRisk&&!S.meshFixed[m.id]){const mc=el("div","card");
  mc.innerHTML=`<b style="color:var(--warn)">⚠️ Mesh not watertight (non-manifold)</b>
   <div class="sub" style="margin:4px 0 8px">This STL has open edges — the slicer will generate holes in the walls if you print it as-is.</div>`;
  const fx=el("button","btn sm teal","🔧 Repair mesh (auto)");
  fx.addEventListener("click",()=>{S.meshFixed[m.id]=true; persist(); Au.pop(); haptic(12);
   unlockAch("meshWright"); toast("Mesh repaired — watertight"); renderSlicer(m);});
  mc.appendChild(fx); c.appendChild(mc);}
 if(GUIDE[m.id])c.appendChild(el("div","card sub","📐 <b style='color:var(--ink)'>Print notes:</b> "+GUIDE[m.id]));
 // auto summary for hidden settings
 const eNow=effective(curSet);
 const autoKeys=["nozzleTemp","bedTemp","speed","fan","retraction"].filter(k2=>!visibleSetting(SET[k2]));
 if(autoKeys.length){const nm={nozzleTemp:"nozzle "+eNow.nozzleTemp+"°C",bedTemp:"bed "+eNow.bedTemp+"°C",
   speed:"speed "+eNow.speed+"mm/s",fan:"fan "+eNow.fan+"%",retraction:"retraction "+eNow.retraction+"mm"};
  c.appendChild(el("div","card sub","🤖 Auto-managed: "+autoKeys.map(k2=>nm[k2]).join(" · ")));}
 // controls grouped by tier
 const tierNames=["Basics","Hobbyist controls","Enthusiast controls","Master controls"];
 let lastTier=-1;
 const ctlRefs={};
 SETTINGS.filter(visibleSetting).forEach(sdef=>{
  if(sdef.tier!==lastTier){lastTier=sdef.tier; c.appendChild(el("div","tierLab",tierNames[sdef.tier]));}
  const box=el("div","ctl"); ctlRefs[sdef.id]=box;
  const lab=el("div","lab");
  const q=el("button","q","?"); q.addEventListener("click",ev=>{ev.stopPropagation(); Au.click(); infoModal(sdef);});
  lab.append(q,el("span",null,sdef.label));
  box.appendChild(lab);
  if(sdef.type==="slider"){
   const val=el("span","val",curSet[sdef.id]+(sdef.unit||"")); lab.appendChild(val);
   const r=document.createElement("input"); r.type="range"; r.min=sdef.min; r.max=sdef.max; r.step=sdef.step; r.value=curSet[sdef.id];
   r.addEventListener("input",()=>{curSet[sdef.id]=parseFloat(r.value); val.textContent=r.value+(sdef.unit||""); tickTh(); updateEst(); updateDims();});
   box.appendChild(r);
  }else if(sdef.type==="select"){
   const b=el("button","selbtn",sdef.opts[curSet[sdef.id]]);
   b.addEventListener("click",()=>{Au.click(); haptic(); openSelect(sdef,curSet[sdef.id],idx=>{
     curSet[sdef.id]=idx; b.textContent=sdef.opts[idx]; Au.pop(); haptic(10); updateEst(); updateDims();});});
   box.appendChild(b);
  }else{ // toggle
   const t=el("button","tog"+(curSet[sdef.id]?" on":""));
   t.addEventListener("click",()=>{curSet[sdef.id]=!curSet[sdef.id]; t.classList.toggle("on",curSet[sdef.id]);
     Au.pop(); haptic(10); updateEst(); updateDims();});
   lab.appendChild(t);}
  c.appendChild(box);});
 // locked settings, earned via calibration mastery
 const lockGroups={};
 SETTINGS.forEach(s=>{if(s.unlockBy&&!S.calib[s.unlockBy]&&(s.onlyTier===undefined||s.onlyTier===tier()))
  (lockGroups[s.unlockBy]=lockGroups[s.unlockBy]||[]).push(s.label);});
 const lockIds=Object.keys(lockGroups);
 if(lockIds.length){c.appendChild(el("div","tierLab","🔒 Locked — prove it on a test print"));
  lockIds.forEach(cid=>{const box=el("div","ctl tap"); box.style.opacity=.62;
   box.innerHTML=`<div class="lab"><span>🔒 ${lockGroups[cid].join(" · ")}</span></div>
    <div class="tiny" style="margin-top:4px;color:var(--teal)">Score 80%+ on the ${MODEL[cid].name} to unlock these</div>`;
   box.addEventListener("click",()=>{Au.click(); curSet=null; renderCatalog("cal");});
   c.appendChild(box);});}
 // estimate bar
 const bar=el("div",null); bar.id="estBar";
 bar.innerHTML=`<div class="figures">
   <span>⏱ <b id="estTime">–</b> <span class="tiny" id="estGame"></span></span>
   <span>🧵 <b id="estG">–</b></span><span>💲 <b id="estC">–</b></span></div>
  <div id="estWarn"></div>
  <button class="btn hot" id="goPrint">▶ Slice & Print</button>`;
 c.appendChild(bar);
 $("#goPrint").addEventListener("click",()=>{Au.click(); haptic(20);
  const est=estimate(m,curSet);
  if(spool().g<=0){toast("That spool is empty — load another."); filamentSheet(); return;}
  S.last[m.id]=Object.assign({},curSet); delete S.last[m.id]._for; persist();
  startPrint(m,est);});
 function updateEst(){const est=estimate(m,curSet);
  $("#estTime").textContent=fmtH(est.h);
  $("#estGame").textContent="("+fmtS(est.h*180)+" real)";
  $("#estG").textContent=Math.round(est.g)+"g";
  const ppg=(SPOOL_SHOP.find(x=>x.id===sp.shop)||{price:25}).price/1000;
  $("#estC").textContent=money(est.g*ppg);
  $("#estWarn").innerHTML=est.g>sp.g?`<div class="chip warn" style="margin-bottom:9px">⚠️ Needs ${Math.round(est.g)}g but only ${Math.round(sp.g)}g on the spool — keep a spare ${FIL[sp.mat].name} spool ready!</div>`:"";}
 function updateDims(){const vase=(visibleSetting(SET.vase)?curSet.vase:0)===1;
  ["infill","infillPattern","topBottom"].forEach(id=>{if(ctlRefs[id])ctlRefs[id].classList.toggle("dis",vase);});
  const brimOn=tier()===0?curSet.adhesionOn:(curSet.adhesionType===2);
  ["brimCount","ears"].forEach(id=>{if(ctlRefs[id])ctlRefs[id].classList.toggle("dis",!brimOn);});}
 updateEst(); updateDims(); show("slicer");}

function openSelect(sdef,cur,cb){openSheet(c=>{
 c.appendChild(el("h3",null,sdef.label));
 sdef.opts.forEach((op,i)=>{const o=el("div","opt"+(i===cur?" on":""),op);
  o.addEventListener("click",()=>{closeSheet(); cb(i);}); c.appendChild(o);});});}
function infoModal(sdef){const f=filCtx();
 openModal(`<h3>ℹ️ ${sdef.label}</h3><p>${sdef.info[0]}</p><p>${sdef.info[1]}</p>
  <div class="rec">💡 For ${FIL[f._m].name}: ${sdef.rec(f)}</div>
  <button class="btn sm" style="margin-top:14px" onclick="closeModal()">Got it</button>`);}
function profilesModal(m){const list=S.profiles[m.id]||[];
 openSheet(c=>{c.appendChild(el("h3",null,"Project profiles · "+m.name));
  c.appendChild(el("div","sub","Save a setting recipe, fail a print, then reload and change one thing at a time."));
  list.forEach((p,i)=>{const o=el("div","opt");
   o.innerHTML=`<span class="grow">📄 ${p.name}</span>`;
   const ren=el("button","chip","rename"); ren.addEventListener("click",ev=>{ev.stopPropagation();
    const n=prompt("Rename profile:",p.name); if(n){p.name=n.slice(0,24); persist(); profilesModal(m);}});
   const del=el("button","chip bad","✕"); del.addEventListener("click",ev=>{ev.stopPropagation();
    list.splice(i,1); persist(); profilesModal(m);});
   o.append(ren,del);
   o.addEventListener("click",()=>{curSet=Object.assign({},p.set); curSet._for=m.id; closeSheet();
    Au.pop(); toast("Profile loaded: "+p.name); renderSlicer(m);});
   c.appendChild(o);});
  const save=el("button","btn teal","💾 Save current settings as profile"); save.style.marginTop="10px";
  save.addEventListener("click",()=>{const n=prompt("Profile name:", m.name+" v"+(list.length+1));
   if(!n)return; if(!S.profiles[m.id])S.profiles[m.id]=[];
   const cp=Object.assign({},curSet); delete cp._for;
   S.profiles[m.id].push({name:n.slice(0,24),set:cp}); persist(); checkAchGlobal(); closeSheet(); toast("Profile saved: "+n);});
  c.appendChild(save);});}
</script>
<script>
"use strict";
/* ================= ISSUE CODEX (real-world causes & fixes) ================= */
const ISSUES={
 string:{name:"Stringing / Oozing",sym:"Fine hairs and wisps bridging every gap",
  causes:["Nozzle temperature too high — plastic gets runny and dribbles during travel moves","Retraction distance too short for this material/extruder","Wet filament — steam pressure pushes ooze out (retraction can't fix this)","Multiple parts printed All-at-Once: travels between parts drag strings"],
  fixes:["Drop nozzle temp 5–10°C (print a Temperature Tower to find the sweet spot)","Run the Retraction Test — find the shortest distance that kills strings","Dry the spool; PETG/TPU may need it before every session","Use One-at-a-Time sequence for multi-part plates"]},
 wet:{name:"Moisture Artifacts",sym:"Popping sounds, foamy pitted extrusion, fuzz everywhere",
  causes:["The filament absorbed ambient humidity; at 200°C+ that water flashes to steam inside the nozzle","PETG, TPU and nylon-likes absorb moisture within hours in open air","Even factory-sealed spools can arrive wet"],
  fixes:["Dry the spool in a filament dryer (PLA 50°C, PETG 65°C, ABS 75°C)","Store and feed from a sealed dry box with desiccant","Desiccant alone maintains dryness — it cannot pull moisture back out; only heat can"]},
 under:{name:"Under-Extrusion",sym:"Gappy, sparse lines; thin weak walls",
  causes:["Flow % set below the filament's true value","Printing faster than the hotend can melt","Partially clogged or worn-out nozzle","Degraded PTFE liner pinching the filament path"],
  fixes:["Run the Flow & First-Layer Test and save the tuned flow %","Slow down, or fit the High-Flow Hotend","Cold pull the nozzle; replace brass nozzles that have worn oval","Replace the PTFE tube (or go All-Metal for high temps)"]},
 over:{name:"Over-Extrusion",sym:"Bulging ridges, blobs, fat corners, rough tops",
  causes:["Flow % above the filament's true value","Nozzle temp far too high, dropping viscosity"],
  fixes:["Run the Flow Test — most filaments land between 93–107%","Bring temperature back inside the material window"]},
 clog:{name:"Partial Clog",sym:"Extruder clicking; extrusion faded mid-print",
  causes:["Carbonized residue from wet-filament steam pops or too-hot printing","Heat creep — the filament softened above the melt zone (PLA in a warm enclosure is famous for it)","Debris or dust dragged in with the filament","Degraded PTFE liner at high temperature"],
  fixes:["Pause and cold pull: heat, cool to ~90°C, yank the filament out with the gunk","Open the enclosure door for PLA; keep it closed for ABS","Dry and dust-wipe filament; feed from a dry box","Replace PTFE / brass nozzle; go all-metal for 240°C+ materials"]},
 grind:{name:"Filament Grinding",sym:"A chewed notch in the filament; short starved band in the print",
  causes:["Extruder gear skated on stuck filament (tangle, jam, or over-long TPU retractions)","Retraction >3mm with flexible filament folds it in the drive gear"],
  fixes:["Clear the tangle/jam, then trim the chewed section","Keep TPU retraction ≤2mm and speed ≤30mm/s","Fit the Filament Guide so the spool can't cross-wind"]},
 shift:{name:"Layer Shift",sym:"Everything above one height is offset sideways",
  causes:["Motors skipped steps — speed/acceleration beyond what the frame can do","Slack belts let the pulley jump teeth","The nozzle snagged a curled-up section of print"],
  fixes:["Slow down; big speed needs a rigid, tuned machine","Tension the belts (they should twang, not thud)","Fix the curling first — it's usually cooling or bed temp"]},
 ring:{name:"Ringing / Ghosting",sym:"Ripple echoes around corners and lettering",
  causes:["Frame vibration at speed — every direction change rings like a bell","Loose belts amplify the oscillation"],
  fixes:["Print outer walls slower","Tension belts; snug the frame bolts"]},
 zband:{name:"Z-Banding",sym:"Regular horizontal waves up the whole print",
  causes:["Dry, dirty Z lead screw and rails binding once per rotation","Worn couplers or a bent screw"],
  fixes:["Clean and lubricate the lead screw and rails (part of monthly maintenance)","Keep lubrication topped up before it runs dry"]},
 delam:{name:"Layer Separation / Cracking",sym:"Layers splitting apart; snaps along a layer line",
  causes:["Nozzle too cold — layers never welded","Too much part-cooling on PETG/ABS chilled each layer before bonding","ABS printed in cold drafts shrinks and tears itself apart","Severely wet filament — steam voids weaken every weld"],
  fixes:["Raise nozzle temp toward the top of the window","PETG 30–50% fan, ABS ≤20%","Enclose ABS and keep the door shut","Dry the spool"]},
 warp:{name:"Warping / Corner Lift",sym:"Corners peeled up off the plate",
  causes:["Plastic shrinks as it cools; a cold bed lets corners contract and lift","Greasy/dusty bed surface killed adhesion","No brim on a warp-prone footprint","ABS in open air"],
  fixes:["Bed temp at the top of the material's window","Wipe the plate with IPA — fingerprints are invisible warp fuel","Add a brim, mouse ears, or a raft","Enclosure, door closed, for ABS"]},
 efoot:{name:"Elephant's Foot",sym:"The bottom edge bulges outward",
  causes:["First layers squished too close (Z-trim too low)","Bed so hot the base stayed soft under the print's weight"],
  fixes:["Re-trim Z with the Flow & First-Layer Test","Drop bed temp toward mid-window after layer one"]},
 adhesion:{name:"Bed Adhesion Failure",sym:"The part let go of the plate — spaghetti",
  causes:["Z-trim too high: the first layer was laid on, not pressed in","Dirty build surface","No adhesion aid on a tall or narrow footprint","Bed temp below the material's window"],
  fixes:["Trim Z until the first line is a pressed, slightly flattened bead","IPA-wipe the plate every few prints","Brim or raft for tall/thin parts; textured PEI helps everything","Set bed temp inside the window"]},
 droop:{name:"Drooping Overhangs",sym:"Sagging, curling edges on overhanging surfaces",
  causes:["Not enough part-cooling to freeze the overhang before gravity wins","Overhangs steeper than ~60° printed without support"],
  fixes:["Fan up (PLA loves 100%); the upgraded cooling fan buys ~10° more angle","Add supports past ~60°, or redesign the angle"]},
 bridge:{name:"Poor Bridging",sym:"Strands sag and droop across unsupported spans",
  causes:["Low fan — bridges must freeze in mid-air","Bridging too fast for the melt to self-support","Span simply too long for the material"],
  fixes:["Max reasonable fan while bridging","Moderate, steady speed across the span","Supports under long spans"]},
 scar:{name:"Support Interface Scarring",sym:"Rough, pockmarked surface where supports touched",
  causes:["Support contact points always leave marks — grid supports touch more than tree","Poor cooling makes the interface weld on harder"],
  fixes:["Tree (organic) supports touch less and scar less","Keep cooling healthy so supports snap away clean","Orient parts to need fewer supported faces"]},
 pillow:{name:"Pillowing",sym:"Pinholes and dimples across the top surface",
  causes:["Too few top layers bridging over sparse infill","Infill too sparse to hold the roof up"],
  fixes:["4+ solid top layers","15%+ infill under large flat tops"]},
 zits:{name:"Zits & Blobs",sym:"Scattered pimples on outer walls",
  causes:["Tiny layers with no time to cool — heat piles up","Pressure burps at travel starts","Slow-down-for-cooling disabled on small features"],
  fixes:["Minimum layer time 6–10s with slow-down enabled","A prime tower stabilizes pressure between travels","Hide seams in the sharpest corner"]},
 seam:{name:"Visible Z Seam",sym:"A zipper line running up one side",
  causes:["Layer start points aligned in one column on a smooth surface"],
  fixes:["Z seam: Sharpest Corner tucks each start into geometry","Fuzzy skin hides seams on decorative parts"]},
 mesh:{name:"Mesh Holes (Non-Manifold)",sym:"Missing chunks of wall the slicer never generated",
  causes:["The STL isn't watertight — open edges and flipped faces confuse the slicer","Downloaded models are often exported broken"],

 pid:{name:"Temperature Instability",sym:"Nozzle temp swinging ±6°; inconsistent sheen and width",
