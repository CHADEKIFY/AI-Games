/* ================= LIVE CHECK ENGINE ================= */
function A(st,id,label,ded,note,z0,z1){st.arts.push({id,label,ded:Math.max(0,Math.round(ded)),note:note||"",at:clamp(st.t/st.gameSec,0,1),z0,z1});
 if(ded>0){Au.bad(); haptic(8);}}
function effSpd(st){return st.e.speed*st.speedFac;}
function sevN(d,a){return d<=0?0:(d<=5?a[0]:(d<=15?a[1]:a[2]));}
function buildSchedule(st){const m=st.m,f=FIL[st.mat],p=fpFor(st.mat),M=mach(),sp=S.spools[S.loaded];
 const C=[]; const put=(t,fn)=>C.push({t,fn,done:false});
 const gapT=m.gapBand?m.gapBand[0]+.03:.45;
 // 1 — first layer & Z trim
 put(.03,st=>{const e=st.e;
  if(M.zTrim>.06){A(st,"under","Poor First Layer (Z high)",8,"The first layer was laid on top of the plate instead of pressed into it.");
   if((m.feats.tallThin||f.warpy)&&e.adhesionType<2&&!S.hw.plate&&st.spag==null){st.spag=clamp(st.t/st.gameSec+.12,.1,.85);
    A(st,"adhesion","First Layer Never Gripped",0,"Z-trim too high on a narrow footprint — it was always going to let go.");}}
  else if(M.zTrim<-.06)A(st,"efoot","Elephant's Foot (over-squish)",8,"Z-trim too low crushed the first layers outward.");});
 // 2 — bed film
 put(.05,st=>{const e=st.e;
  if(e.adhesionType===3)return;
  if(M.bedClean<25&&!(S.hw.plate&&m.feats.largeBase)&&st.spag==null){st.spag=clamp(st.t/st.gameSec+.13,.12,.85);
   A(st,"adhesion","Greasy Build Plate",0,"Weeks of fingerprints — nothing sticks to skin oil.");}
  else if(M.bedClean<50&&(f.warpy||m.feats.largeBase))A(st,"warp","Warping (dirty plate)",8,"Marginal grip on a filmed-over plate let corners creep.");});
 // 3 — bed temperature
 put(.07,st=>{const e=st.e; const bHi=e.bedTemp-f.bt[1], bLo=f.bt[0]-e.bedTemp;
  if(bHi>0)A(st,"efoot","Elephant's Foot",sevN(bHi,[8,12,18]),"Bed above "+f.bt[1]+"°C kept the base soft under the print's weight.");
  if(bLo>0&&(m.feats.largeBase||f.warpy)&&st.spag==null){
   if(bLo>12&&e.adhesionType<2){st.spag=clamp(st.t/st.gameSec+.15,.15,.85); A(st,"adhesion","Cold Bed Release",0,"Bed "+e.bedTemp+"°C vs a "+f.bt[0]+"°C minimum — shrinkage popped it loose.");}
   else A(st,"warp","Warping (cold bed)",sevN(bLo,[10,16,26])-(e.ears&&m.feats.largeBase?6:0)-(e.adhesionType===3?6:0),"Bed below the window let corners contract and lift.");}});
 // 4 — ABS chamber
 put(.2,st=>{const e=st.e;
  if(st.mat!=="abs")return;
  if(!S.hw.enclosure||st.chamberOpen){A(st,"warp","ABS Warp — open air",28,st.chamberOpen?"The enclosure door was open — drafts got in.":"No enclosure: ABS shrinks hard as it cools.");
   C.push({t:.55,done:false,fn:s2=>A(s2,"delam","ABS Cracking",14,"Uneven cooling split the tall sections.")});}});
 // 5 — moisture
 put(.22,st=>{const mo=sp.moist||0;
  if(mo>=65){A(st,"wet","Severe Moisture Artifacts",14,"Steam pops pocked the whole surface — this spool is soaked ("+Math.round(mo)+"%).");
   C.push({t:.5,done:false,fn:s2=>A(s2,"delam","Steam-Weakened Layers",10,"Water voids in every weld.")});}
  else if(mo>=35)A(st,"wet","Moisture Artifacts",7,"Popping and fuzz — the spool has drunk "+Math.round(mo)+"% humidity.");});
 // 6 — nozzle temp window
 put(.28,st=>{const e=st.e; const swing=M.pid?0:4;
  const nLo=f.nt[0]-e.nozzleTemp+swing;
  if(nLo>0)A(st,"delam","Cold Nozzle — poor bonding",sevN(nLo,[8,16,28]),(M.pid?"":"(±6° PID swings dipped it colder) ")+"Layers never fused below "+f.nt[0]+"°C.");
  if(!M.pid)A(st,"pid","Temperature Instability",6,"The heater hunts ±6° until PID is re-tuned.");});
 put(.31,st=>{const e=st.e; const nHi=e.nozzleTemp-f.nt[1]+(M.pid?0:4);
  if(nHi>8)A(st,"burnt","Burnt Specks",6,"Residue cooking on an over-hot nozzle flaked into the walls.");
  if(!S.hw.allmetal&&M.ptfe<30&&e.nozzleTemp>230)A(st,"burnt","Charred PTFE Flecks",6,"The browned liner is shedding into the melt.");});
 // 7 — melt rate vs speed
 put(.34,st=>{const e=st.e; const PS=printerStats();
   const safe=st.mat==="tpu"?f.maxSpd:(S.hw.hotend?PS.boosted:PS.base); const v=effSpd(st);
  if(v>safe){A(st,"under","Under-Extrusion (melt-limited)",sevN(v-safe,[8,14,22]),v.toFixed(0)+" mm/s outruns the hotend's melt rate (safe ≤"+safe+").");
   if(m.feats.letters)A(st,"ring","Ringing at Speed",sevN(v-safe,[6,10,16]),"Corners echo at this pace.");
   if(v>safe*1.5)C.push({t:.55,done:false,fn:s2=>A(s2,"shift","Layer Shift",26,"The steppers finally skipped.")});}});
 // 8 — batch sweet spots (Hard/Realistic)
 put(.37,st=>{const e=st.e;
  if(DIFF.tol.t<90&&e.nozzleTemp>=f.nt[0]&&e.nozzleTemp<=f.nt[1]){
   const d=Math.abs(e.nozzleTemp-p.ideal.t);
   if(d>DIFF.tol.t)A(st,"dull","Off-Dial Temperature",d>DIFF.tol.t*2?9:5,"In the window, but "+d.toFixed(0)+"° off THIS batch's sweet spot"+(p.known.t?" ("+p.ideal.t+"°C).":" — a Temp Tower would find it."));}});
 put(.39,st=>{const e=st.e; const d=e.flow-p.ideal.f;
  if(d<-(DIFF.tol.f+1))A(st,"under","Under-Extrusion (flow)",sevN(-d,[6,10,16]),"Flow "+e.flow+"% vs this filament's true "+(p.known.f?p.ideal.f+"%":"value")+" starves the lines.");
  if(d>DIFF.tol.f+1)A(st,"over","Over-Extrusion (flow)",sevN(d,[6,10,16]),"Flow "+e.flow+"% overfeeds — ridges and fat corners.");});
 // 9 — mechanicals
 put(.41,st=>{if(M.belts<40){A(st,"ring","Ringing (slack belts)",M.belts<15?12:6,"The belts thud instead of twang.");
   if(M.belts<15)C.push({t:.6,done:false,fn:s2=>A(s2,"shift","Layer Shift (belt jump)",22,"A pulley skipped teeth on a slack belt.")});}});
 put(.43,st=>{if(M.lube<30)A(st,"zband","Z-Banding",M.lube<10?12:6,"A dry lead screw binds once per turn — the bands count the rotations.");});
 put(.45,st=>{if(!S.hw.nozzle&&M.nozzleWear>=60)A(st,"wearN","Worn Nozzle Extrusion",Math.min(22,M.nozzleWear/4),"The brass bore has worn oval — flow wanders.");});
 // 10 — stringing & retraction
 put(gapT,st=>{const e=st.e;
  if(!(m.feats.gaps||f.stringy||m.feats.multi))return;
  const need=p.ideal.r+((e.nozzleTemp-f.nt[1])>0?1:0)+((sp.moist||0)>=35?1.5:0)+((m.feats.multi&&e.sequence===0)?.5:0);
  const short=need-e.retraction;
  if(short>.4)A(st,"string","Stringing",sevN(short*8,[6,12,20]),"Effective retraction need ~"+need.toFixed(1)+"mm; set "+e.retraction+"mm."+(((sp.moist||0)>=35)?" Wet filament raises the bar.":""));
  else if(DIFF.tol.r<90&&m.feats.gaps&&Math.abs(e.retraction-p.ideal.r)>DIFF.tol.r)
   A(st,"dull","Off-Dial Retraction",4,"Close, but this spool wants "+(p.known.r?p.ideal.r+"mm":"a Retraction-Test-tuned value")+".");
  if(st.mat==="tpu"&&e.retraction>3)A(st,"grind","TPU Retraction Grinding",10,"Long retractions fold flexible filament into the drive gear.",clamp(st.t/st.gameSec,0,1),clamp(st.t/st.gameSec+.08,0,1));});
 // 11 — cooling
 put(.5,st=>{const e=st.e;
  if(e.fan>f.fan[1]&&(st.mat==="petg"||st.mat==="abs"))A(st,"delam","Over-Cooled Layers",sevN(e.fan-f.fan[1],[8,14,20]),f.name+" wants ≤"+f.fan[1]+"% fan or the welds chill.");
  if((m.feats.overhangs||m.feats.steep)&&e.fan<f.fan[0]){let d=sevN(f.fan[0]-e.fan,[8,14,22]);
   if(coolRank()>=1)d=Math.max(4,d-6); if(coolRank()>=2)d=Math.max(3,d-3);
   if(!(m.feats.steep&&e.supports>0))A(st,"droop","Drooping Overhangs",d,"Fresh plastic sagged before the fan could freeze it.");}
  if(m.feats.steep&&e.supports===0)A(st,"droop","Collapsed Steep Overhangs",(coolRank()>=2?8:coolRank()>=1?10:16)+(m.id==="overhang"?4:0),"The 60–75° sections printed into thin air.");
  if(e.supports>0&&(m.feats.steep||m.feats.overhangs))A(st,"scar","Support Interface Scars",(e.supports===1?4:1.5)+(e.fan<f.fan[0]?3:0),(e.supports===1?"Grid":"Tree")+" contact points"+(e.fan<f.fan[0]?", welded on harder by weak cooling.":"."));
  if(st.mat==="silk"&&effSpd(st)>f.slow)A(st,"dull","Dull Silk Finish",8,"Silk sheared past "+f.slow+" mm/s loses its shine.");});
 put(.56,st=>{const e=st.e;
  if(m.feats.bridges&&(e.fan<Math.max(60,f.fan[0])||effSpd(st)>70))A(st,"bridge","Sagging Bridges",e.fan<40?12:7,"Bridges must freeze mid-air: strong fan, moderate speed.");});
 // 12 — seams & surface
 put(.6,st=>{const e=st.e;
  if(e.zSeam===1&&e.fuzzy===0)A(st,"seam","Visible Z Seam",5,"Aligned starts stacked into a zipper line.");
  if(e.zSeam===2)A(st,"zits","Scattered Seam Blobs",3,"Random starts sprinkled blobs across the walls.");});
 put(.68,st=>{const e=st.e;
  if(e.vase!==1&&m.feats.small&&(e.minLayerTime<4||!e.slowCool)&&!e.prime)A(st,"zits","Zits & Blobs",8,"Tiny layers got no cool-down; heat pooled into pimples.");});
 // 13 — structure
 put(.3,st=>{const e=st.e; if(e.vase===1&&!m.feats.vaseOK)A(st,"hollow","Hollow Shell",20,"Vase mode deleted the infill, tops and internals this model needed.");});
 put(.35,st=>{if(DIFF.meshBug&&m.meshRisk&&!S.meshFixed[m.id])A(st,"mesh","Mesh Holes (non-manifold)",15,"The slicer skipped walls it couldn't close.");});
 put(.9,st=>{const e=st.e; if(e.vase!==1&&e.topBottom<=1&&e.infill<15&&m.id!=="lithophane")A(st,"pillow","Pillowing",10,"Thin roofs sagged into sparse infill.");});
 put(.8,st=>{const e=st.e;
  if((m.id==="cube")&&(M.belts<60||Math.abs(e.flow-p.ideal.f)>4))A(st,"dimens","Out of Square",8,"The 20mm cube isn't 20mm — belts and flow decide dimensions.");});
 // 14 — per-model rules
 put(.75,st=>{const e=st.e;
  if(m.id==="lithophane"){
   if(e._lh>.165)A(st,"dull","Detail Lost",10,"Lithophanes live at 0.12–0.16mm layers — "+e._lh.toFixed(2)+"mm blurred the image.");
   if(e.vase!==1&&e.infill<80)A(st,"dimens","Blotchy Backlight",8,"Light shows the infill lattice below ~80% density.");
   if(effSpd(st)>45)A(st,"under","Inconsistent Thickness",6,"Fast passes vary the wall the image is made of.");}
  if(m.id==="gearbox"){
   if(Math.abs(e.flow-p.ideal.f)>2||e.walls<2)A(st,"dimens","Gears Bind",14,"Function needs calibrated flow and ≥2 walls — these tolerances are welded shut.");
   if(e.sequence===0)A(st,"string","Inter-Part Strings",5,"All-at-Once dragged wisps between the gears.");}
  if(m.id==="dragon"&&st.arts.some(a=>a.id==="string"&&a.ded>=10))A(st,"dimens","Joints Fused",8,"Strings welded the print-in-place hinges solid.");
  if(m.id==="planter"&&e.vase===1&&(e.flow-p.ideal.f)<-1)A(st,"under","Weeping Seams",6,"A single spiral wall needs slight over-flow to seal — this one leaks.");});
 C.sort((a,b)=>a.t-b.t); return C;}

/* ================= PRINT SESSION ================= */
function startPrint(m,est){const e0=est.e; const sp=spool(); const mat=sp.mat;
 const gameSec=clamp(est.h*180,40,3600);
 const layers=Math.max(26,Math.round(m.hMM/e0._lh));
 sim={m,e:Object.assign({},e0),est,mat,gameSec,layers,t:0,done:false,paused:false,flags:{},arts:[],
  colorSeg:[{from:0,color:sp.color,name:sp.name}],pauses:0,speedFac:1,
  chamberOpen:false,incident:null,once:{},msg:"",msgT:0,
  spag:null,spagged:false,zview:mach().zTrim>.06?"hi":(mach().zTrim<-.06?"lo":null),
  raf:0,lastT:performance.now()};
 sim.schedule=buildSchedule(sim);
 renderPrintScreen(); Au.startPrint(); haptic(15);
 sim.raf=requestAnimationFrame(printLoop);}

function renderPrintScreen(){const c=$("#scr-print"); c.innerHTML="";
 const head=el("div","head");
 head.append(el("div","grow",`<h2>Printing · ${sim.m.name}</h2><div class="sub">1 print-hour = 3 real minutes · watch it like a hawk</div>`));
 c.appendChild(head);
 const wrap=el("div",null); wrap.id="printWrap";
 wrap.innerHTML=`<canvas id="printCv"></canvas>
  <div id="printStats">
   <span>Layer <b id="stLayer" class="mono">0/0</b></span>
   <span>🔥 <b id="stNoz" class="mono">–</b></span>
   <span>🛏 <b id="stBed" class="mono">–</b></span>
   <span>🌀 <b id="stFan" class="mono">–</b></span>
   <span>⚡ <b id="stSpd" class="mono">–</b></span></div>`;
 c.appendChild(wrap);
 c.appendChild(el("div",null,"<div id='ticker'></div>"));
 c.appendChild(el("div","progress","<i id='pBar'></i>"));
 c.appendChild(el("div","row sub mono",`<span id="pElapsed">0m 00s</span><span class="grow"></span><span id="pLeft"></span>`));
 const br=el("div","btnrow"); br.style.marginTop="10px";
 const tuneB=el("button","btn","🎛 Tune"); tuneB.addEventListener("click",()=>{Au.click(); tunePanel();});
 const pauseB=el("button","btn","⏸ Pause"); pauseB.id="pauseBtn";
 pauseB.addEventListener("click",()=>{Au.click(); pausePanel();});
 br.append(tuneB,pauseB); c.appendChild(br);
 show("print");
 const cv=$("#printCv"); sim.cvCtx=fitCanvas(cv,.86);}

function tickerMsg(st,txt,sticky){st.msg=txt; st.msgT=sticky?1e12:performance.now()+5200;}

function startIncident(st,type,label){st.incident={type,len:0,z0:clamp(st.t/st.gameSec,0,1)};
 Au.warn(); haptic([40,30,50]); tickerMsg(st,label,true);
 const pb=$("#pauseBtn"); if(pb)pb.classList.add("pulse");}
function clearIncident(st){st.incident=null; st.msgT=0; st.msg="";
 const pb=$("#pauseBtn"); if(pb)pb.classList.remove("pulse");}
function finalizeBand(st,kind){const inc=st.incident; if(!inc)return;
 const z1=clamp(st.t/st.gameSec,0,1);
 if(kind==="grind")st.arts.push({id:"grind",label:"Filament Grinding Band",ded:4+Math.min(6,Math.round(inc.len*80)),note:"The drive gear chewed while the spool fought back.",at:inc.z0,z0:inc.z0,z1});
 else st.arts.push({id:"under",label:"Under-Extrusion Band (partial clog)",ded:4+Math.min(10,Math.round(inc.len*100)),note:"Starved flow from when the clog began until you cleared it.",at:inc.z0,z0:inc.z0,z1});}

function handleRunout(st,why){
 if(S.hw.sensor){st.runoutWait=why; tickerMsg(st,"⏸ "+(why==="snap"?"Filament snapped":"Spool ran out")+" — sensor paused the print. Swap the spool.",true);
  Au.warn(); haptic([50,40,60]); pausePanel(true);}
 else{st.flags.dry=true; st.spagged=true; if(st.spag==null)st.spag=clamp(st.t/st.gameSec,0,1);
  A(st,"dry",why==="snap"?"Filament Snapped — air print":"Ran Out of Filament — air print",0,"No runout sensor: the extruder pushed air for the rest of the job.");
  tickerMsg(st,"💨 Air printing — no sensor caught it.",true);}}

function incidentTick(st,dt){const M=mach(),f=FIL[st.mat],sp=S.spools[S.loaded]||{moist:0};
 const prog=clamp(st.t/st.gameSec,0,1);
 if(st.incident){if(!st.paused){st.incident.len+=dt/st.gameSec*st.speedFac;
   if(st.incident.type==="clog"&&st.incident.len>.10){finalizeBand(st,"clog");
    st.flags.dry=true; st.spagged=true; if(st.spag==null)st.spag=prog;
    st.arts.push({id:"clog",label:"Full Jam — air printing",ded:0,note:"Ignored long enough, the partial clog sealed shut.",at:prog});
    clearIncident(st); tickerMsg(st,"💀 The clog sealed shut. Air printing.",true);}
   else if(st.incident.type==="tangle"&&st.incident.len>.08){finalizeBand(st,"grind");
    st.flags.dry=true; st.spagged=true; if(st.spag==null)st.spag=prog;
    st.arts.push({id:"grind",label:"Tangle Stall — air printing",ded:0,note:"The tangle pulled tight and the extruder ground through the filament.",at:prog});
    clearIncident(st); tickerMsg(st,"💀 The tangle won. Filament ground through.",true);}}
  return;}
 if(st.paused||st.done||st.spagged||st.runoutWait)return;
 const em=DIFF.eventMul, roll=p=>Math.random()<p*dt*em/60;
 // partial clog
 let rc=.004+((sp.moist||0)>=50?.03:(sp.moist||0)>=35?.012:0)
  +((!S.hw.allmetal&&M.ptfe<40&&st.e.nozzleTemp>235)?.03:0)
  +((!S.hw.nozzle&&M.nozzleWear>70)?.012:0)
  +((st.mat==="tpu"&&effSpd(st)>f.maxSpd)?.09:0);
 const plaFam=(st.mat==="pla"||st.mat==="silk"||st.mat==="matte"||st.mat==="cf");
 if(plaFam&&S.hw.enclosure&&!st.chamberOpen&&st.gameSec>150){rc+=.05;
  if(!st.once.hc){st.once.hc=1; tickerMsg(st,"🌡 Chamber's warm — PLA is softening above the melt zone. Open the door?");}}
 if(roll(rc)){startIncident(st,"clog","⚠️ Extruder clicking — flow is dropping! (Pause → Cold Pull)");
  if(plaFam&&S.hw.enclosure&&!st.chamberOpen)st.arts.push({id:"heat",label:"Heat Creep",ded:0,note:"The warm chamber softened PLA above the melt zone.",at:prog}); return;}
 // tangle
 if(!S.mods.filamentGuide&&!st.once.tg&&roll(.004)){st.once.tg=1;
  startIncident(st,"tangle","⚠️ Spool tangle — the extruder is fighting it! (Pause → Untangle)"); return;}
 // brittle snap
 if((sp.moist||0)>70&&(st.mat==="pla"||st.mat==="petg"||st.mat==="cf")&&!st.once.sn&&roll(.01)){
  st.once.sn=1; handleRunout(st,"snap"); return;}
 // power
 if(DIFF.id==="realistic"&&!st.once.pw&&roll(.0009)){st.once.pw=1;
  if(S.hw.ups){tickerMsg(st,"💡 Brownout — the UPS carried it like nothing happened."); Au.pop();}
  else{st.flags.power=true; tickerMsg(st,"⚫ POWER LOSS.",true); setTimeout(finishPrint,900); st.done=true;}}}

function printLoop(now){if(!sim)return;
 const st=sim;
 const dt=Math.min(.08,(now-st.lastT)/1000); st.lastT=now;
 if(!st.done&&!st.paused&&!st.runoutWait)st.t+=dt;
 const prog=clamp(st.t/st.gameSec,0,1);
 // filament consumption
 const sp=S.spools[S.loaded];
 if(sp&&!st.done&&!st.paused&&!st.runoutWait&&!st.flags.dry){
  const gRate=st.est.g/st.gameSec;
  if(sp.g>0)sp.g=Math.max(0,sp.g-gRate*dt);
  else if(!st.spagged)handleRunout(st,"runout");}
 if(Math.random()<.05)renderHUD();
 // scheduled checks (evaluated with LIVE settings)
 if(!st.paused&&!st.spagged)for(const ck of st.schedule){if(!ck.done&&prog>=ck.t){ck.done=true; ck.fn(st);}}
 incidentTick(st,dt);
 if(st.spag!=null&&prog>=st.spag&&!st.spagged){st.spagged=true; Au.bad(); haptic([60,40,60]);
  tickerMsg(st,"💥 The print broke loose — spaghetti everywhere.",true);}
 drawPrintFrame(prog);
 // stats
 const e=st.e,M=mach(),jig=Math.sin(now/300)*(M.pid?1.4:5.5);
 $("#stLayer").textContent=Math.min(st.layers,Math.floor(prog*st.layers)+1)+"/"+st.layers;
 $("#stNoz").textContent=Math.round(e.nozzleTemp+jig)+"°C";
 $("#stBed").textContent=Math.round(e.bedTemp+jig*.3)+"°C";
 $("#stFan").textContent=e.fan+"%";
 $("#stSpd").textContent=(st.spagged||st.paused||st.runoutWait?0:Math.round(effSpd(st)))+"mm/s";
 $("#pBar").style.width=(prog*100)+"%";
 $("#pElapsed").textContent=fmtS(st.t);
 $("#pLeft").textContent="-"+fmtS(Math.max(0,st.gameSec-st.t));
 const tk=$("#ticker");
 if(tk)tk.textContent=(st.msgT>performance.now())?st.msg:"";
 Au.setStepper(effSpd(st)/160,!st.done&&!st.spagged&&!st.paused&&!st.runoutWait);
 if(prog>=1&&!st.done){st.done=true; setTimeout(finishPrint,600);}
 if(sim)sim.raf=requestAnimationFrame(printLoop);}

/* ---- Pause & Tune panels (the realistic replacements for minigames) ---- */
function pausePanel(forced){if(!sim)return; const st=sim;
 if(!st.paused){st.paused=true; st.pauses++;}
 Au.setStepper(0,false);
 const c=$("#miniC"); c.innerHTML="";
 c.appendChild(el("h3",null,st.runoutWait?"⏸ Paused — filament ended":"⏸ Print paused"));
 c.appendChild(el("div","tiny",st.runoutWait?"The runout sensor caught it. Swap in a matching spool to continue.":"The nozzle is parked and oozing slightly — every pause leaves a small mark."));
 const list=el("div",null); list.style.marginTop="10px"; c.appendChild(list);
 const act=(label,cls,fn)=>{const b=el("button","btn sm "+(cls||""),label); b.style.margin="4px 4px 0 0"; b.addEventListener("click",fn); list.appendChild(b); return b;};
 if(st.incident&&st.incident.type==="clog")act("🧊 Cold pull the nozzle","teal",()=>{finalizeBand(st,"clog"); clearIncident(st);
  Au.pop(); haptic(14); unlockAch("coldPull"); toast("The pull came out with the gunk — flow restored"); pausePanel();});
 if(st.incident&&st.incident.type==="tangle")act("🧶 Untangle the spool","teal",()=>{finalizeBand(st,"grind"); clearIncident(st);
  Au.pop(); haptic(12); toast("Spool freed and re-wound"); pausePanel();});
 act("🔄 Swap spool","",()=>{renderSwapList(st,list);});
 if(S.hw.enclosure)act(st.chamberOpen?"🚪 Close enclosure door":"🚪 Open enclosure door","",()=>{st.chamberOpen=!st.chamberOpen;
  Au.tick(); toast(st.chamberOpen?"Door open — chamber cooling (good for PLA, bad for ABS)":"Door closed — heat trapped (good for ABS)"); pausePanel();});
 act("▶ Resume","hot",()=>{if(st.runoutWait){toast("Swap in a spool first — the line is empty"); return;}
  st.arts.push({id:"pausem",label:"Pause Mark",ded:st.pauses<=3?2:0,note:"The nozzle sat and oozed at this height.",at:clamp(st.t/st.gameSec,0,1),z0:clamp(st.t/st.gameSec,0,1)});
  st.paused=false; $("#mini").classList.remove("on"); Au.pop();});
 act("✕ Abort print","",()=>{if(confirm("Abort? Filament used so far is wasted and it pays nothing."))
  {st.flags.aborted=true; $("#mini").classList.remove("on"); finishPrint();}});
 $("#mini").classList.add("on");}

function renderSwapList(st,host){host.querySelectorAll(".swapopt").forEach(n=>n.remove());
 const spares=S.spools.map((s2,i)=>({s2,i})).filter(o=>o.i!==S.loaded&&o.s2.mat===st.mat&&o.s2.g>5);
 if(!spares.length){toast("No spare "+FIL[st.mat].name+" spool with material on it"); return;}
 spares.forEach(o=>{const b=el("div","opt swapopt");
  b.innerHTML=`<span class="dot" style="width:14px;height:14px;border-radius:50%;background:${o.s2.color}"></span>
    <span class="grow">${o.s2.name}</span><span class="mono sub">${Math.round(o.s2.g)}g</span>`;
  b.addEventListener("click",()=>{S.loaded=o.i;
   st.colorSeg.push({from:Math.floor(clamp(st.t/st.gameSec,0,1)*st.layers),color:o.s2.color,name:o.s2.name});
   if(st.runoutWait){st.runoutWait=false; st.msgT=0;}
   persist(); renderHUD(); Au.pop(); haptic(15); toast("Loaded "+o.s2.name); pausePanel();});
  host.appendChild(b);});}

 mkRow("🔥 Nozzle",()=>st.e.nozzleTemp,v=>st.e.nozzleTemp=v,5,170,280,"°");

 mkRow("🌀 Fan",()=>st.e.fan,v=>st.e.fan=v,10,0,100,"%");
 mkRow("⚡ Feed rate",()=>Math.round(st.speedFac*100),v=>st.speedFac=v/100,10,50,120,"%");
 const done=el("button","btn hot","Done"); done.style.marginTop="14px";

/* ---- frame rendering ---- */
function drawPrintFrame(prog){const {x,w,h}=sim.cvCtx; const st=sim;
 const modColors={}; for(const id in S.mods)modColors[id]=S.mods[id];
 if(prog<.045&&!st.spagged){drawFirstLayer(x,w,h,prog/.045); return;}
 const m=st.m,e=st.e;
 const geo=drawPrinter(x,w,h,{mods:modColors,spool:spool()?spool().color:null,hotGlow:false,
  pro:printerStats().pro,skin:perk("skinCarbon")?"skinCarbon":perk("skinIvory")?"skinIvory":null});
 const {cx,bedY,frW,frH}=geo;
 const K=Math.min(frH*.62/m.hMM,frW*.7/m.wMM);
 const topZ=prog*m.hMM*K;
 const gz=Math.max(bedY-frH+18,bedY-8-topZ-25);
 const idle=st.paused||st.runoutWait||st.spagged||st.done;
 const oscT=performance.now()/(420-Math.min(160,effSpd(st))*1.8);
 const toolX=idle?cx-frW*.32:cx+Math.sin(oscT)*Math.min(frW*.3,m.wMM*K*.55);
 drawPrinter(x,w,h,{mods:modColors,spool:spool()?spool().color:null,gantryY:gz,toolX,hotGlow:!st.spagged,
  pro:printerStats().pro,skin:perk("skinCarbon")?"skinCarbon":perk("skinIvory")?"skinIvory":null});
 renderModel(x,cx,bedY-8,m,e,prog,K,st,false);}

function drawFirstLayer(x,w,h,f){
 const g=x.createLinearGradient(0,0,0,h);
 g.addColorStop(0,"#141a24"); g.addColorStop(1,"#0c1017");
 x.fillStyle=g; x.fillRect(0,0,w,h);
 x.fillStyle="#8fa0b6"; x.font="700 11px ui-monospace,monospace"; x.textAlign="center";
 x.fillText("FIRST LAYER — the squish decides everything",w/2,26);
 const plate=S&&S.hw&&S.hw.plate;
 const bg=x.createLinearGradient(0,h*.3,0,h*.8);
 if(plate){bg.addColorStop(0,"#4a3a22"); bg.addColorStop(1,"#2e2416");}
 else{bg.addColorStop(0,"#233048"); bg.addColorStop(1,"#161d2c");}
 x.fillStyle=bg; x.fillRect(20,h*.3,w-40,h*.5);
 x.strokeStyle=plate?"#6b5533":"#3b4a68"; x.strokeRect(20,h*.3,w-40,h*.5);
 x.fillStyle="#ffffff0a"; x.beginPath();
 x.moveTo(30,h*.3); x.lineTo(80,h*.3); x.lineTo(50,h*.8); x.lineTo(24,h*.8); x.closePath(); x.fill();
 if(plate){x.strokeStyle="#00000040";
  for(let i=26;i<w-26;i+=9){x.beginPath();x.moveTo(i,h*.32);x.lineTo(i+4,h*.78);x.stroke();}}
 const rows=6, colr=sim.colorSeg[0].color; x.lineCap="round";
 const z=sim.zview; const lw=z==="lo"?9:(z==="hi"?3.5:6);
 const doneRows=f*rows; let tipX=0,tipY=0;
 for(let r=0;r<doneRows;r++){const y=h*.36+r*(h*.4/rows); const fr=clamp(doneRows-r,0,1);
  const ex=34+(w-68)*fr;
  x.strokeStyle="#00000044"; x.lineWidth=lw+2; x.setLineDash([]);
  x.beginPath(); x.moveTo(34,y+1.5); x.lineTo(ex,y+1.5); x.stroke();
  x.strokeStyle=colr; x.lineWidth=lw; x.globalAlpha=z==="lo"?.55:1;
  if(z==="hi")x.setLineDash([8,7]); else x.setLineDash([]);
  x.beginPath(); x.moveTo(34,y); x.lineTo(ex,y); x.stroke();
  x.globalAlpha=1;
  x.strokeStyle="#ffffff2c"; x.lineWidth=Math.max(1,lw*.3); x.setLineDash([]);
  x.beginPath(); x.moveTo(34,y-lw*.24); x.lineTo(ex,y-lw*.24); x.stroke();
  if(fr<1){tipX=ex; tipY=y;}}
 if(tipX){const ng=x.createRadialGradient(tipX,tipY,0,tipX,tipY,10);
  ng.addColorStop(0,"#ffb04dcc"); ng.addColorStop(1,"#00000000");
  x.fillStyle=ng; x.beginPath(); x.arc(tipX,tipY,10,0,7); x.fill();}
 x.setLineDash([]); x.globalAlpha=1; x.lineCap="butt"; x.textAlign="left"; x.lineWidth=1;}

/* ---- shared model renderer (live + inspection) ---- */
function activeArts(st,prog){return st.arts.filter(a=>prog>=a.at);}
function wScaleOf(m){return .45;}
function renderModel(x,cx,bedY,m,e,prog,K,st,inspect){
 const arts=st?activeArts(st,prog):[];
 const ids={}; for(const a of arts)ids[a.id]=1;
 const has=id=>!!ids[id];
 const bands=arts.filter(a=>a.z0!=null&&a.z1!=null);
 const pmarks=arts.filter(a=>a.id==="pausem");
 const genUnder=arts.some(a=>((a.id==="under")&&a.z0==null)||a.id==="wearN");
 const spag=st&&st.spagged;
 const spagP=st&&st.spag!=null?st.spag:1;
 const drawP=spag?Math.min(prog,spagP):prog;
 const H=m.hMM*K, topZ=drawP*H;
 const pts=m.prof;
 const wAt=t=>{for(let i=1;i<pts.length;i++){if(t<=pts[i][0]){const a=pts[i-1],b=pts[i];
   const f2=(t-a[0])/Math.max(.0001,b[0]-a[0]); return lerp(a[1],b[1],f2);}} return pts[pts.length-1][1];};
 const W2=m.wMM*K/2;
 const shift=has("shift")?{z:(st.shiftZ||(st.shiftZ=rnd(.45,.7))),dx:K*4}:null;
 const efoot=has("efoot"), warp=has("warp");
 const sides=m.twin?[-1,1]:[0]; const off=m.twin?W2*.55:0; const wScale=m.twin?.45:1;
 const yOf=t=>bedY-t*H;
 for(const side of sides){
  const P=new Path2D(); const sx=cx+side*off;
  const xw=(t)=>{let ww=wAt(t)*W2*wScale;
   if(efoot&&t<.05)ww*=1+(0.05-t)*6*.5;
   return ww;};
  const dxAt=t=>shift&&t>shift.z?shift.dx:0;
  // contact shadow
  x.save(); const shw=xw(0)+10;
  const sg2=x.createRadialGradient(sx,bedY+3,1,sx,bedY+3,shw);
  sg2.addColorStop(0,"#00000066"); sg2.addColorStop(1,"#00000000");
  x.fillStyle=sg2; x.translate(sx,bedY+3); x.scale(1,.22); x.translate(-sx,-(bedY+3));
  x.beginPath(); x.arc(sx,bedY+3,shw,0,7); x.fill(); x.restore();
  P.moveTo(sx-xw(0)+dxAt(0),bedY);
  const steps=40;
  for(let i=0;i<=steps;i++){const t=i/steps*drawP; P.lineTo(sx-xw(t)+dxAt(t),yOf(t));}
  for(let i=steps;i>=0;i--){const t=i/steps*drawP; P.lineTo(sx+xw(t)+dxAt(t),yOf(t));}
  P.closePath();
  // fill: color segments + infill
  x.save(); x.clip(P);
  const segs=st?st.colorSeg:[{from:0,color:"#8f959e"}];
  for(let si=0;si<segs.length;si++){const s0=segs[si], s1=segs[si+1];
   const t0=s0.from/(st?st.layers:1), t1=s1?s1.from/(st?st.layers:1):1;
   const y1=bedY-Math.min(drawP,t1)*H, y0=bedY-Math.min(drawP,t0)*H;
   x.fillStyle=s0.color; x.globalAlpha=e.vase===1?.16:.34; x.fillRect(sx-W2-8,y1,W2*2+16,y0-y1+1); x.globalAlpha=1;
   if(e.vase!==1)drawInfill(x,e.infillPattern,sx-W2,y1,W2*2,y0-y1,s0.color,K);
  }
  // form shading + material finish
  const bodyG=x.createLinearGradient(sx-W2,0,sx+W2,0);
  bodyG.addColorStop(0,"#00000055"); bodyG.addColorStop(.3,"#00000000");
  bodyG.addColorStop(.52,"#ffffff14"); bodyG.addColorStop(.75,"#00000010"); bodyG.addColorStop(1,"#00000066");
  x.fillStyle=bodyG; x.fillRect(sx-W2-8,bedY-topZ-2,W2*2+16,topZ+4);
  const matId=st&&st.mat;
  if(matId==="silk"&&!has("dull")){x.globalAlpha=.22;
   const sh1=x.createLinearGradient(sx-W2,bedY,sx+W2,bedY-topZ);
   sh1.addColorStop(.3,"#ffffff00"); sh1.addColorStop(.44,"#ffffff"); sh1.addColorStop(.52,"#ffffff00");
   sh1.addColorStop(.64,"#ffffff00"); sh1.addColorStop(.72,"#ffffffaa"); sh1.addColorStop(.8,"#ffffff00");
   x.fillStyle=sh1; x.fillRect(sx-W2,bedY-topZ,W2*2,topZ); x.globalAlpha=1;}
  else if(matId==="cf"){x.fillStyle="#00000055";
   for(let i=0;i<50;i++)x.fillRect(sx-W2+((i*73)%(W2*2||1)),bedY-((i*47)%Math.max(2,topZ)),1.2,1.2);
   x.fillStyle="#ffffff22";
   for(let i=0;i<24;i++)x.fillRect(sx-W2+((i*97)%(W2*2||1)),bedY-((i*61)%Math.max(2,topZ)),1,1);}
  else if(matId!=="matte"&&e.fuzzy===0&&!has("dull")){x.fillStyle="#ffffff10";
   x.fillRect(sx-W2*.42,bedY-topZ,3,topZ);}
  // generic under-extrusion rows
  if(genUnder){x.strokeStyle="#0009"; x.lineWidth=1.5;
   for(let t=.1;t<drawP;t+=.07){if(((t*97)|0)%3===0){const y=yOf(t);
    x.beginPath(); x.moveTo(sx-xw(t),y); x.lineTo(sx+xw(t),y); x.stroke();}}}
  // clog/tangle bands
  for(const b of bands){x.strokeStyle="#000b"; x.lineWidth=1.6;
   for(let t=b.z0;t<Math.min(drawP,b.z1);t+=.012){const y=yOf(t);
    x.beginPath(); x.moveTo(sx-xw(t)*.96,y); x.lineTo(sx+xw(t)*.96,y); x.stroke();}}
  // Z-banding / PID waves
  if(has("zband")||has("pid")){x.fillStyle=has("zband")?"#00000026":"#00000014";
   for(let y=bedY-6;y>bedY-topZ;y-=7){const o=Math.sin(y*.5)*1.2;
    x.fillRect(sx-W2-6+o,y,W2*2+12,2.4);}}
  // burnt specks
  if(has("burnt")){x.fillStyle="#4a2f14";
   for(let i=0;i<14;i++){const t=((i*53)%90)/100*drawP; const px=sx-xw(t)+((i*37)%Math.max(2,xw(t)*2));
    x.fillRect(px,yOf(t),2,2);}}
  // mesh holes
  if(has("mesh")){x.fillStyle="#10151d"; x.strokeStyle="#ff556388";
   for(const t of[.3,.55]){if(t<drawP){const y=yOf(t);
    x.fillRect(sx-xw(t)+3,y-9,7,9); x.strokeRect(sx-xw(t)+3,y-9,7,9);
    x.fillRect(sx+xw(t)-11,y+6,7,8); x.strokeRect(sx+xw(t)-11,y+6,7,8);}}}
  // delamination cracks
  if(has("delam")){x.strokeStyle="#000c"; x.lineWidth=2;
   for(const t of[.3,.55,.75]){if(t<drawP){const y=yOf(t);
    x.beginPath(); x.moveTo(sx-xw(t)*.9,y); x.lineTo(sx-xw(t)*.2,y+2); x.lineTo(sx+xw(t)*.6,y-1); x.lineTo(sx+xw(t)*.95,y+1); x.stroke();}}}
  x.restore();
  // layer lines
  x.save(); x.clip(P); x.strokeStyle="#00000022";
  const step=Math.max(2.5,e._lh*K*6);
  for(let y=bedY;y>bedY-topZ;y-=step){x.beginPath();x.moveTo(sx-W2-6,y);x.lineTo(sx+W2+6,y);x.stroke();}
  x.restore();
  // outline / walls
  const mainColor=(st?st.colorSeg[st.colorSeg.length-1].color:"#8f959e");
  x.strokeStyle=mainColor; x.lineWidth=Math.max(2,e.walls*1.1);
  if(has("ring")){x.save(); x.setLineDash([3,2]); x.stroke(P); x.restore();}
  else if(e.fuzzy>0){x.save(); x.setLineDash(e.fuzzy===1?[2,2]:[1,3]); x.stroke(P); x.restore();}
  else x.stroke(P);
  // over-extrusion bumps
  if(has("over")||has("blob")){x.fillStyle=mainColor;
   for(let t=.12;t<drawP;t+=.09){const y=yOf(t);
    x.beginPath(); x.arc(sx+xw(t)+dxAt(t),y,2,0,7); x.arc(sx-xw(t)+dxAt(t),y+3,1.6,0,7); x.fill();}}
  // moisture fuzz
  if(has("wet")){x.strokeStyle=mainColor; x.globalAlpha=.5; x.lineWidth=.8;
   for(let t=.06;t<drawP;t+=.05){const y=yOf(t);
    x.beginPath(); x.moveTo(sx+xw(t),y); x.lineTo(sx+xw(t)+3,y-2); x.stroke();
    x.beginPath(); x.moveTo(sx-xw(t),y); x.lineTo(sx-xw(t)-3,y-1); x.stroke();}
   x.globalAlpha=.35; for(let i=0;i<8;i++)x.fillRect(sx-W2+((i*67)%(W2*2||1)),bedY-((i*41)%Math.max(2,topZ)),1.4,1.4);
   x.globalAlpha=1;}
  // seam zipper
  if(has("seam")){x.fillStyle=mainColor;
   for(let t=.05;t<drawP;t+=.04){x.beginPath(); x.arc(sx+xw(t)-1.5,yOf(t),1.1,0,7); x.fill();}}
  // pause marks
  for(const pm of pmarks){if(pm.z0<drawP){const y=yOf(pm.z0);
   x.strokeStyle="#ffffff55"; x.lineWidth=1.4;
   x.beginPath(); x.moveTo(sx-xw(pm.z0),y); x.lineTo(sx+xw(pm.z0),y); x.stroke();
   x.fillStyle=mainColor; x.beginPath(); x.arc(sx+xw(pm.z0)+1,y,2.2,0,7); x.fill();}}
  // support scars roughness
  if(has("scar")&&drawP>.5){x.strokeStyle="#00000066"; x.lineWidth=1.2;
   for(let i=0;i<7;i++){const t=.45+i*.02; const y=yOf(t);
    x.beginPath(); x.moveTo(sx-xw(t)+2+i,y); x.lineTo(sx-xw(t)+6+i,y+2); x.stroke();}}
  // dimensional ghost
  if(has("dimens")&&inspect){x.strokeStyle="#ffd16688"; x.setLineDash([4,4]); x.lineWidth=1.2;
   x.beginPath(); x.moveTo(sx-W2-5,bedY); x.lineTo(sx-W2-5,bedY-topZ);
   x.moveTo(sx+W2+5,bedY); x.lineTo(sx+W2+5,bedY-topZ); x.stroke(); x.setLineDash([]);}
  // fresh molten top layer
  if(!inspect&&drawP<1&&!spag){const ty2=bedY-topZ;
   x.strokeStyle="#ffb04d"; x.globalAlpha=.85; x.lineWidth=1.6; x.beginPath();
   x.moveTo(sx-xw(drawP)+dxAt(drawP),ty2); x.lineTo(sx+xw(drawP)+dxAt(drawP),ty2); x.stroke();
   x.globalAlpha=.22; x.lineWidth=4; x.stroke(); x.globalAlpha=1; x.lineWidth=1;}
  // warp: lifted corners
  if(warp){x.strokeStyle=mainColor; x.lineWidth=3;
   x.beginPath(); x.moveTo(sx-xw(0)-1,bedY+1); x.quadraticCurveTo(sx-xw(0)-6,bedY-4,sx-xw(0)-9,bedY-10); x.stroke();
   x.beginPath(); x.moveTo(sx+xw(0)+1,bedY+1); x.quadraticCurveTo(sx+xw(0)+6,bedY-4,sx+xw(0)+9,bedY-10); x.stroke();}
 }
 // adhesion aids
 const mainColor2=(st?st.colorSeg[0].color:"#8f959e");
 if(e.adhesionType===2&&!spag){x.strokeStyle=mainColor2; x.globalAlpha=.6; x.lineWidth=2;
  x.beginPath(); x.moveTo(cx-W2-6-e.brimCount*.7,bedY+2); x.lineTo(cx+W2+6+e.brimCount*.7,bedY+2); x.stroke(); x.globalAlpha=1;}
 if(e.adhesionType===3){x.fillStyle=mainColor2; x.globalAlpha=.4; x.fillRect(cx-W2-8,bedY,W2*2+16,4); x.globalAlpha=1;}
 if(e.ears){x.fillStyle=mainColor2; x.globalAlpha=.6;
  x.beginPath(); x.arc(cx-W2-4,bedY+2,4,0,7); x.arc(cx+W2+4,bedY+2,4,0,7); x.fill(); x.globalAlpha=1;}
 // supports (removed at inspection)
 if(e.supports>0&&(m.feats.steep||m.feats.overhangs)&&!spag&&!inspect){
  x.strokeStyle="#9db0c8"; x.globalAlpha=.5; x.lineWidth=1.5;
  const sx0=cx-W2*.55, supTop=Math.min(topZ,H*.55);
  if(e.supports===1){for(let i=0;i<4;i++){x.beginPath(); x.moveTo(sx0+i*7,bedY); x.lineTo(sx0+i*7,bedY-supTop); x.stroke();}}
  else{x.beginPath(); x.moveTo(sx0+10,bedY); x.quadraticCurveTo(sx0-2,bedY-supTop*.6,sx0+8,bedY-supTop);
   x.moveTo(sx0+10,bedY-supTop*.5); x.lineTo(sx0+18,bedY-supTop); x.stroke();}
  x.globalAlpha=1;}
 // temperature tower segment labels
 if(m.twr){x.strokeStyle="#00000044"; x.fillStyle="#e9eef5aa"; x.font="700 8px ui-monospace,monospace"; x.textAlign="center";
  for(let i=0;i<m.twr;i++){const t=(i+1)/m.twr; if(t<=drawP+.01){const y=bedY-t*H;
   x.beginPath(); x.moveTo(cx-W2,y); x.lineTo(cx+W2,y); x.stroke();}
   const tm=(i-2)*10+e.nozzleTemp; const ty=bedY-(i+.5)/m.twr*H;
   if((i+.2)/m.twr<drawP)x.fillText(tm+"°",cx,ty+3);}
  x.textAlign="left";}
 // stringing webs
 if(has("string")&&m.gapBand&&drawP>m.gapBand[0]){x.strokeStyle=mainColor2; x.globalAlpha=.55; x.lineWidth=.8;
  const t0=m.gapBand[0],t1=Math.min(drawP,m.gapBand[1]);
  const gx0=m.twin?cx-off+W2*wScaleOf(m):cx-W2*.5, gx1=m.twin?cx+off-W2*wScaleOf(m):cx+W2*.5;
  for(let i=0;i<7;i++){const t=lerp(t0,t1,i/7); const y=bedY-t*H;
   x.beginPath(); x.moveTo(gx0,y); x.quadraticCurveTo(cx,y+rnd(2,7),gx1,y-rnd(0,3)); x.stroke();}
  x.globalAlpha=1;}
 // droop / bridge sag
 if((has("droop")||has("bridge"))&&drawP>.5){x.strokeStyle=mainColor2; x.globalAlpha=.8; x.lineWidth=2;
  for(let i=0;i<4;i++){const t=.5+i*.06; if(t<drawP){const y=bedY-t*H;
   x.beginPath(); x.moveTo(cx-W2*.6,y); x.quadraticCurveTo(cx,y+8+i*2,cx+W2*.6,y); x.stroke();}}
  x.globalAlpha=1;}
 // zits
 if(has("zits")&&drawP>.4){x.fillStyle=mainColor2;
  for(let i=0;i<10;i++){const t=(.3+((i*37)%60)/100)*drawP; const y=bedY-t*H;
   const side2=i%2?1:-1; const ww=wAt(t)*W2*(m.twin?.45:1);
   const bx=m.twin?cx+side2*off+side2*ww:cx+side2*ww;
   x.beginPath(); x.arc(bx,y,1.6,0,7); x.fill();}}
 // pillowing
 if(has("pillow")&&drawP>.95){x.fillStyle="#0009";
  for(let i=0;i<6;i++){x.beginPath(); x.arc(cx-W2*.5+i*W2*.2,bedY-topZ+2,1.4,0,7); x.fill();}}
 // spaghetti pile (skipped for dry air-prints — nothing extruded)
 if(spag&&!(st&&st.flags.dry)){const pileP=clamp((prog-spagP)/.25,0,1);
  const colr=(st?st.colorSeg[st.colorSeg.length-1].color:"#999");
  x.strokeStyle=colr; x.lineWidth=1.6; x.globalAlpha=.9;
  const n=Math.floor(pileP*26)+4;
  for(let i=0;i<n;i++){const y=bedY-2-(i%5)*3; const a=cx+Math.sin(i*3.7)*W2;
   x.beginPath(); x.moveTo(a-12,y); x.bezierCurveTo(a-4,y-6,a+4,y+5,a+12,y-2); x.stroke();}
  x.globalAlpha=1;}
}
function drawInfill(x,pat,x0,y0,wd,ht,color,K){if(ht<=0)return;
 x.strokeStyle=color; x.globalAlpha=.5; x.lineWidth=1;
 const s=Math.max(6,K*4);
 x.beginPath();
 if(pat===0){for(let i=x0-ht;i<x0+wd;i+=s){x.moveTo(i,y0+ht);x.lineTo(i+ht,y0);}
  for(let i=x0;i<x0+wd+ht;i+=s){x.moveTo(i,y0);x.lineTo(i-ht,y0+ht);}}
 else if(pat===1){for(let i=x0-ht;i<x0+wd;i+=s*.8){x.moveTo(i,y0+ht);x.lineTo(i+ht,y0);}}
 else if(pat===2){for(let yy=y0;yy<y0+ht;yy+=s){for(let i=x0;i<x0+wd;i+=s){
   x.moveTo(i,yy+s);x.lineTo(i+s/2,yy);x.lineTo(i+s,yy+s);x.lineTo(i,yy+s);}}}
 else if(pat===3){for(let yy=y0+3;yy<y0+ht;yy+=s*.9){x.moveTo(x0,yy);
   for(let i=0;i<=wd;i+=3)x.lineTo(x0+i,yy+Math.sin((i/s)*2.4+yy)*s*.32);}}
 else{const r=s*.55; for(let yy=y0+r;yy<y0+ht;yy+=r*1.6){let row=Math.round(yy/r)%2;
   for(let i=x0+(row?r:0);i<x0+wd;i+=r*1.9){for(let a=0;a<6;a++){
    const px=i+r*Math.cos(a*Math.PI/3),py=yy+r*Math.sin(a*Math.PI/3);
    if(a===0)x.moveTo(px,py); else x.lineTo(px,py);}x.closePath();}}}
 x.stroke(); x.globalAlpha=1;}
</script>
<script>
"use strict";
ACH.push(
 {id:"spoolCollector",name:"Spool Hoarder",desc:"Own 8 different filament types."},
 {id:"squish",name:"Perfect Squish",desc:"Master the Flow & First-Layer Test (80%+)."},
 {id:"coldPull",name:"The Old Cold Pull",desc:"Clear a partial clog mid-print with a cold pull."},
 {id:"boneDry",name:"Bone Dry",desc:"Run a spool through the filament dryer."},
 {id:"meshWright",name:"Watertight",desc:"Repair a non-manifold mesh before slicing."},
 {id:"researcher",name:"Root Cause",desc:"Pay for your first defect diagnosis."},
 {id:"archivist",name:"Field Notes",desc:"Fill 12 entries of the troubleshooting Field Guide."},
 {id:"encyclopedic",name:"Encyclopedic",desc:"Complete the entire Field Guide."},
 {id:"greaseMonkey",name:"Grease Monkey",desc:"Perform your first machine service."},
 {id:"mechanic",name:"Shade-Tree Mechanic",desc:"Perform 15 machine services."},
 {id:"highMileage",name:"High Mileage",desc:"Put 100 print-hours on the machine."},
 {id:"ironHorse",name:"Iron Horse",desc:"Put 300 print-hours on the machine."},
 {id:"whisperer",name:"Filament Whisperer",desc:"Fully tune one material: temp, flow & retraction."},
 {id:"masterTuner",name:"Master Tuner",desc:"Fully tune four different materials."},
 {id:"realDeal",name:"The Real Deal",desc:"A 100% perfect print on Realistic difficulty."},
 {id:"consistency",name:"Consistency",desc:"Five 90%+ prints in a row."},
 {id:"blackout",name:"Character Building",desc:"Lose a print to a power flicker."},
 {id:"preparedness",name:"Preparedness",desc:"Own the Runout Sensor and the UPS."});

/* ================= FINISH / WEAR ================= */
function finishPrint(){if(!sim)return; cancelAnimationFrame(sim.raf); Au.stopPrint();
 $("#mini").classList.remove("on");
 const st=sim; sim=null;
 st.finalProg=clamp(st.t/st.gameSec,0,1); if(st.flags.aborted)st.finalProg=Math.min(st.finalProg,.99);
 const used=st.est.g*st.finalProg, h=st.est.h*st.finalProg, M=mach(), wu=wearMul(), e=st.e;
 S.stats.grams+=used;
 M.hours+=h;
 M.lube=clamp(M.lube-h*1.7*wu,0,100);
 M.belts=clamp(M.belts-h*1.25*wu,0,100);
 if(!S.hw.allmetal)M.ptfe=clamp(M.ptfe-h*(e.nozzleTemp>245?5:e.nozzleTemp>235?2.5:.35)*wu,0,100);
 M.bedClean=clamp(M.bedClean-(S.hw.plate?3.5:6),0,100);
 if(!S.hw.nozzle)M.nozzleWear=clamp(M.nozzleWear+used*FIL[st.mat].abr*wu,0,100);
 M.zTrim=clamp(M.zTrim+rnd(-.02,.02)*wu*(1+h*.2)*(S.hw.abl?.4:1),-.15,.15);
 const sp=S.spools[S.loaded];
 if(sp&&DIFF.moistMul>0)sp.moist=clamp((sp.moist||0)+FIL[st.mat].hygro*h*.5*moistMul(),0,100);
 if(sp)useIt("s_"+sp.shop);
 HW.forEach(hh=>{if(S.hw[hh.id]&&hh.id!=="dryer"&&hh.id!=="pro")useIt("h_"+hh.id);});
 if(printerStats().pro)useIt("h_pro");
 if(perk("perkWipe"))M.bedClean=100;
 S.spools=S.spools.filter((s2,i)=>{if(s2.g>=1)return true; if(i<=S.loaded&&S.loaded>0)S.loaded--; return false;});
 if(S.loaded>=S.spools.length)S.loaded=Math.max(0,S.spools.length-1);
 persist(); goInspect(st);}

/* ================= GRADE / REVEAL / PAYOUT ================= */
function spoolShopOf(st){const seg=st.colorSeg[0]; const f=SPOOL_SHOP.find(s=>s.color===seg.color&&s.name===seg.name); return f?f.id:null;}
function issueKey(a){return ISSUES[a.id]?a.id:"under";}
function goInspect(st){const m=st.m,e=st.e;
 const failed=st.spagged||st.flags.aborted||st.flags.dry||st.flags.power;
 // merge (bands & pause marks stay separate)
 const map={},arts=[];
 for(const a of st.arts){
  if(a.z0!=null||a.id==="pausem"){arts.push(a); continue;}
  if(!map[a.id]||map[a.id].ded<a.ded)map[a.id]=a;}
 for(const k in map)arts.push(map[k]);
 arts.sort((a,b)=>a.at-b.at);
 if(st.flags.power)arts.push({id:"power",label:"Power Loss",ded:0,note:"The lights flickered and the machine forgot everything.",at:1});
 if(st.flags.aborted)arts.push({id:"abort",label:"Print Aborted",ded:0,note:Math.round(st.est.g*st.finalProg)+"g of filament spent for nothing.",at:1});
 if(st.spagged&&!st.flags.dry&&!arts.some(a=>a.id==="adhesion"))
  arts.push({id:"adhesion",label:"Full Detachment — Spaghetti",ded:0,note:"The model tore free of the bed.",at:st.spag||.5});
 let grade=failed?0:clamp(Math.round(100-arts.reduce((s2,a)=>s2+a.ded,0)*DIFF.curve),0,100);
 const perfect=grade===100&&!failed;
 // free diagnosis tiers auto-fill the codex
 if(DIFF.freeDx)arts.forEach(a=>{S.codex[issueKey(a)]=true;});
 arts.forEach(a=>{if(ISSUES[issueKey(a)].free)S.codex[issueKey(a)]=true;});
 // filament tuning reveals (any completed test teaches, even an ugly one)
 const tuneMsgs=[]; const p=fpFor(st.mat); const fN=FIL[st.mat].name;
 if(!failed){
  if(m.id==="temptower"&&!p.known.t){p.known.t=true; p.set.t=p.ideal.t;
   tuneMsgs.push("🌡 This "+fN+" batch's sweet spot: "+p.ideal.t+"°C — saved to its filament profile.");}
  if(m.id==="flowcube"&&!p.known.f){p.known.f=true; p.set.f=p.ideal.f; mach().zTrim=0;
   tuneMsgs.push("💧 True flow for this "+fN+": "+p.ideal.f+"% — saved. First-layer Z-trim zeroed.");}
  if(m.id==="retract"&&!p.known.r){p.known.r=true; p.set.r=p.ideal.r;
   tuneMsgs.push("↩️ Shortest clean retraction for this "+fN+": "+p.ideal.r+"mm — saved.");}
  if(p.known.t&&p.known.f&&p.known.r){unlockAch("whisperer");
   if(Object.values(S.fp).filter(q=>q.known.t&&q.known.f&&q.known.r).length>=4)unlockAch("masterTuner");}}
 // calibration mastery unlocks settings
 let calUnlocks=null;
 if(m.cat==="cal"&&!failed&&grade>=80&&!S.calib[m.id]){
  S.calib[m.id]=true;
  calUnlocks=SETTINGS.filter(s2=>s2.unlockBy===m.id).map(s2=>s2.label);
  const calAch={benchy:"seaTrials",cube:"dialedIn",overhang:"defyingGravity",temptower:"goldilocks",retract:"stringTheory",flowcube:"squish",tolerance:"tolerancer"};
  if(calAch[m.id])unlockAch(calAch[m.id]);}
 // payout
 let pay=0, orderBonus=0, orderHit=null, modInstalled=false;
 if(m.cat==="mod"){if(!failed&&grade>=60){S.mods[m.modId]=st.colorSeg[0].color; modInstalled=true;}}
 else if(m.cat!=="cal"&&!failed){pay=m.pay*grade/100*DIFF.mult; if(perfect)pay*=1.25;
  if(perk("perkPayout"))pay*=1.05; pay=Math.round(pay);
  const spShop=(S.spools[S.loaded]||{}).shop;
  for(const o of S.orders){if(o.done)continue; if(o.model!==m.id)continue;
   if(o.mat!==st.mat)continue; if(o.shop&&o.shop!==spoolShopOf(st)&&o.shop!==spShop)continue;
   if(grade>=70){o.done=true; S.stats.orders=(S.stats.orders||0)+1; orderHit=o; orderBonus=o.bonus; break;}}}
 S.money+=pay+orderBonus;
 if(!st.flags.aborted)S.stats.prints++;
 if(failed)S.stats.fails++;
 if(perfect){S.stats.perfects++; S.perfected=S.perfected||{};
  if(m.cat!=="mod"){S.perfected[m.id]=true; if(printerStats().pro)unlockAch("proPerfect");}}
 S.stats.earned+=pay+orderBonus;
 S.stats.streak=(!failed&&grade>=90)?(S.stats.streak||0)+1:0;
 if(S.stats.streak>=5)unlockAch("consistency");
 if(!failed&&grade>=90&&m.cat!=="mod"){S.shelf.push({model:m.id,grade,color:st.colorSeg[0].color}); S.shelf=S.shelf.slice(-12);}
 // new-content achievements
 if(!failed){const fx=FIL[st.mat].fx;
  if(m.id==="cableclips")unlockAch("batchRun");
  if(m.id==="hexbins"&&grade>=90)unlockAch("binThere");
  if(m.id==="fish"&&grade>=90)unlockAch("gillsAndGears");
  if(m.id==="voronoi"&&grade>=90)unlockAch("bridgeBuilder");
  if(m.id==="bust"&&grade>=90)unlockAch("portraitist");
  if(fx==="dual"||fx==="grad")unlockAch("technicolor");
  if(fx==="glow")unlockAch("nightLight");
  if((fx==="glow"||fx==="glitter")&&S.hw.nozzle)unlockAch("abrasiveTruth");
  const spec=["dual","gradient","trisilk","glitter","glow","thermo","marble"];
  if(spec.every(k3=>S.stats.mats&&S.stats.mats[k3]))unlockAch("fullSpectrum");}
 // achievements
 checkAchGlobal();
 if(perfect)unlockAch("firstPerfect");
 if(perfect&&m.id==="benchy")unlockAch("perfectBenchy");
 if(perfect&&DIFF.id==="realistic")unlockAch("realDeal");
 if(!failed&&st.mat==="abs"&&grade>=90)unlockAch("absMaster");
 if(!failed&&e.speed>=100&&grade>=90)unlockAch("speedDemon");
 if(!failed&&e.vase===1&&grade>=90)unlockAch("vaseLife");
 if(!failed&&st.mat==="cf")unlockAch("cfCrafter");
 if(failed&&!st.flags.aborted&&!st.flags.power)unlockAch("spaghetti");
 if(st.flags.power)unlockAch("blackout");
 if(!failed&&st.gameSec>=1800)unlockAch("marathon");
 if(!failed&&grade>=90&&m.id==="dragon")unlockAch("dragonTamer");
 if(!failed&&grade>=90&&m.id==="gearbox")unlockAch("clockmaker");
 if(!failed){S.stats.mats=S.stats.mats||{}; S.stats.mats[st.mat]=1;
  if(Object.keys(S.stats.mats).length>=5)unlockAch("materialWorld");}
 persist(); renderHUD();
 renderInspect(st,arts,grade,pay,orderBonus,orderHit,failed,perfect,modInstalled,calUnlocks,tuneMsgs);}

/* ================= INSPECTION ================= */
let inspRaf=0;
function issueModal(k){const I=ISSUES[k];
 openModal(`<h3>${I.name}</h3>
  <p class="sub" style="font-style:italic">"${I.sym}"</p>
  <div class="tierLab" style="margin-top:10px">Likely causes</div>
  ${I.causes.map(c2=>`<p style="margin:5px 0">• ${c2}</p>`).join("")}
  <div class="tierLab" style="margin-top:10px">Fixes</div>
  ${I.fixes.map(c2=>`<p style="margin:5px 0;color:var(--good)">✓ ${c2}</p>`).join("")}
  <button class="btn sm" style="margin-top:14px" onclick="closeModal()">Got it</button>`);}
function artTagEl(a,failed){const k=issueKey(a); const known=!!S.codex[k];
 const tg=el("div","artTag"+(a.ded===0&&!failed?" okk":""));
 const dedTxt=failed&&a.ded===0?"FAIL":(a.ded>0?"−"+Math.round(a.ded*DIFF.curve):"–");
 if(known){tg.innerHTML=`<div class="grow"><b style="font-size:13px">${a.label}</b>
   <div class="tiny" style="margin-top:2px">${a.note||ISSUES[k].sym}</div>
   <div class="tiny" style="color:var(--teal);margin-top:2px">tap for causes & fixes</div></div>
   <span class="ded">${dedTxt}</span>`;
  tg.classList.add("tap"); tg.addEventListener("click",()=>{Au.click(); issueModal(k);});}
 else{tg.innerHTML=`<div class="grow"><b style="font-size:13px">Unidentified defect</b>
   <div class="tiny" style="margin-top:2px;font-style:italic">"${ISSUES[k].sym}"</div></div>
   <span class="ded">${dedTxt}</span>`;
  const rb=el("button","btn sm teal","🔍 Research "+money(DIFF.dxCost));
  rb.style.margin="0 0 0 8px";
  rb.addEventListener("click",ev=>{ev.stopPropagation();
   if(S.money<DIFF.dxCost){toast("Not enough for the research fee"); return;}
   spend(perk("assistant")?0:DIFF.dxCost); S.codex[k]=true; S.stats.research++;
   unlockAch("researcher");
   if(Object.keys(S.codex).length>=12)unlockAch("archivist");
   if(Object.keys(ISSUES).every(q=>S.codex[q]))unlockAch("encyclopedic");
   persist(); renderHUD(); Au.cash(); haptic(12);
   const nt=artTagEl(a,failed); tg.replaceWith(nt); issueModal(k);});
  tg.appendChild(rb);}
 return tg;}

function renderInspect(st,arts,grade,pay,orderBonus,orderHit,failed,perfect,modInstalled,calUnlocks,tuneMsgs){
 const c=$("#scr-inspect"); c.innerHTML="";
 const m=st.m;
 c.appendChild(el("div","head",`<div class="grow"><h2>Quality Inspection</h2><div class="sub">${m.name} · ${st.colorSeg.map(s2=>s2.name).join(" → ")}</div></div>`));
 if(perfect)c.appendChild(el("div","perfectBanner","★ PERFECT PRINT ★<div class='tiny' style='color:var(--teal)'>Every variable dialed. +25% bonus · Showcase Shelf</div>"));
 const wrap=el("div",null); wrap.id="printWrap"; wrap.innerHTML=`<canvas id="inspCv"></canvas>`;
 c.appendChild(wrap);
 const gradeEl=el("div",null,"0%"); gradeEl.id="gradeBig";
 gradeEl.style.color=failed?"var(--bad)":grade>=90?"var(--good)":grade>=60?"var(--warn)":"var(--bad)";
 c.appendChild(gradeEl);
 c.appendChild(el("div","sub",`<div style="text-align:center;margin-bottom:12px">Quality grade${failed?" — print failed":""} · ${DIFF.name} curve ×${DIFF.curve}</div>`));
 (tuneMsgs||[]).forEach(t2=>{const tc=el("div","card",t2); tc.style.borderColor="var(--teal)"; c.appendChild(tc);});
 if(calUnlocks){const uc=el("div","card"); uc.style.borderColor="var(--teal)";
  uc.innerHTML=`<b style="color:var(--teal)">🔓 SETTINGS UNLOCKED</b>
   <div class="sub" style="margin-top:5px">${calUnlocks.join(" · ")} — now live in the slicer on this save.</div>`;
  c.appendChild(uc);}
 const tags=el("div",null); c.appendChild(tags);
 const payCard=el("div","card");
 if(m.cat==="cal"){payCard.innerHTML=`<b>🧪 Test print — no payout.</b>
   <div class="sub" style="margin-top:4px">${failed?"The data died with the print — and the filament is still gone.":grade>=80?"Calibration logged. The machine gives up its secrets.":"Score 80%+ to certify this calibration and unlock its settings."}</div>`;}
 else if(m.cat==="mod"){payCard.innerHTML=modInstalled?
   `<b>🔧 Mod installed!</b><div class="sub" style="margin-top:4px">${m.name} now lives on your PrintCraft SE in ${st.colorSeg[0].name}.</div>`:
   `<b style="color:var(--bad)">Mod too warped to fit.</b><div class="sub" style="margin-top:4px">Needs a 60%+ grade. The filament is gone; try again.</div>`;}
 else payCard.innerHTML=`<div class="row"><span class="sub grow">Base ${money(m.pay)} × ${grade}% × ${DIFF.mult} (${DIFF.name})${perfect?" × 1.25 perfect":""}</span>
   <b class="pricetag">${pay?"+"+money(pay):money(0)}</b></div>
  ${orderHit?`<div class="row" style="margin-top:6px"><span class="sub grow">📦 Customer order fulfilled</span><b class="pricetag">+${money(orderBonus)}</b></div>`:""}
  ${failed?`<div class="tiny" style="color:var(--bad);margin-top:6px">Failed prints pay nothing — and the ${Math.round(st.est.g*st.finalProg)}g of filament is gone forever.</div>`:""}`;
 c.appendChild(payCard);
 const br=el("div","btnrow");
 const again=el("button","btn teal","↺ Tune & reprint");
 again.addEventListener("click",()=>{Au.click(); cancelAnimationFrame(inspRaf);
  curSet=Object.assign({},S.last[m.id]||defaultSettings(m)); curSet._for=m.id;
  renderSlicer(m);});
 const cat=el("button","btn","Catalog");
 cat.addEventListener("click",()=>{Au.click(); cancelAnimationFrame(inspRaf); renderCatalog(m.cat);});
 const home=el("button","btn","Menu");
 home.addEventListener("click",()=>{Au.click(); cancelAnimationFrame(inspRaf); renderMenu();});
 br.append(again,cat,home); c.appendChild(br);
 show("inspect");
 // studio orbit
 const cv=$("#inspCv"); const ctx=fitCanvas(cv,.8);
 const t0=performance.now();
 const orbit=()=>{if(!$("#scr-inspect").classList.contains("on"))return;
  const {x,w,h}=ctx; const t=(performance.now()-t0)/1000;
  x.clearRect(0,0,w,h); const g=x.createLinearGradient(0,0,0,h);
  g.addColorStop(0,"#1a2230"); g.addColorStop(.6,"#10151e"); g.addColorStop(1,"#090c11");
  x.fillStyle=g; x.fillRect(0,0,w,h);
  const bedY=h*.85, cx2=w/2;
  const spot=x.createRadialGradient(cx2,bedY-h*.3,10,cx2,bedY-h*.3,h*.62);
  spot.addColorStop(0,"#ffffff10"); spot.addColorStop(1,"#00000000");
  x.fillStyle=spot; x.fillRect(0,0,w,h);
  x.save(); x.translate(cx2,bedY+4); x.scale(1,.24); x.translate(-cx2,-(bedY+4));
  const tt=x.createRadialGradient(cx2,bedY+4,4,cx2,bedY+4,w*.34);
  tt.addColorStop(0,"#3a4660"); tt.addColorStop(.8,"#232c3c"); tt.addColorStop(1,"#161c28");
  x.fillStyle=tt; x.beginPath(); x.arc(cx2,bedY+4,w*.34,0,7); x.fill();
  x.strokeStyle="#4b5a78"; x.stroke(); x.restore();
  const K=Math.min(h*.68/m.hMM,w*.5/m.wMM);
  const sway=.86+.14*Math.cos(t*.9);
  x.save(); x.translate(cx2,bedY); x.scale(sway,1); x.translate(-cx2,-bedY);
  renderModel(x,cx2,bedY,m,st.e,st.flags.aborted?st.finalProg:1,K,st,true);
  x.restore();

/* ================= BADGES / PRESTIGE / COMPLETION ================= */
/* Badge art evolves with level: bronze → silver → gold → gemmed → winged */
function badgeTier(l){return l<=1?0:l<=2?1:l<=3?2:l<=5?3:4;}
function badgeColors(l){const t=badgeTier(l);
 return [["#a9713f","#e0a165","#6d4522"],["#8d97a6","#dfe6ef","#5d6674"],
         ["#c99418","#ffdc7a","#8a6206"],["#7b4fd0","#c9a6ff","#4a2b86"],
         ["#1f9f92","#7ff0e2","#116057"]][t];}
function drawBadge(x,w,h,level){
 const t=badgeTier(level), C=badgeColors(level), cx=w/2, cy=h*.52, R=Math.min(w,h)*.34;
 x.clearRect(0,0,w,h);
 if(t>=4){ // wings
  x.fillStyle=C[1]; x.globalAlpha=.85;
  for(const s of [-1,1]){x.beginPath();
   x.moveTo(cx+s*R*.85,cy-R*.15);
   x.quadraticCurveTo(cx+s*R*2.1,cy-R*.95,cx+s*R*2.25,cy+R*.05);
   x.quadraticCurveTo(cx+s*R*1.7,cy-R*.1,cx+s*R*.9,cy+R*.3);
   x.closePath(); x.fill();}
  x.globalAlpha=1;}
 if(t>=2){ // laurel wreath
  x.strokeStyle=C[0]; x.lineWidth=2.2; x.globalAlpha=.9;
  for(const s of [-1,1]){x.beginPath();
   x.arc(cx,cy,R*1.28,s>0?-.55:Math.PI+.55,s>0?1.05:Math.PI-1.05,s<0); x.stroke();}
  x.globalAlpha=1;}
 // shield
 const g=x.createLinearGradient(cx-R,cy-R,cx+R,cy+R);
 g.addColorStop(0,C[1]); g.addColorStop(.5,C[0]); g.addColorStop(1,C[2]);
 x.fillStyle=g; x.beginPath();
 x.moveTo(cx,cy-R*1.05); x.lineTo(cx+R*.92,cy-R*.55); x.lineTo(cx+R*.72,cy+R*.62);
 x.lineTo(cx,cy+R*1.12); x.lineTo(cx-R*.72,cy+R*.62); x.lineTo(cx-R*.92,cy-R*.55);
 x.closePath(); x.fill();
 x.strokeStyle=C[2]; x.lineWidth=1.6; x.stroke();
 // inner nozzle emblem
 x.fillStyle="#0e1219"; x.globalAlpha=.55;
 x.beginPath(); x.moveTo(cx-R*.3,cy-R*.42); x.lineTo(cx+R*.3,cy-R*.42);
 x.lineTo(cx+R*.16,cy+R*.18); x.lineTo(cx,cy+R*.46); x.lineTo(cx-R*.16,cy+R*.18);
 x.closePath(); x.fill(); x.globalAlpha=1;
 x.strokeStyle=C[1]; x.lineWidth=1.3; x.stroke();
 if(t>=3){ // gems
  const gem=["#ff5563","#35d0c0","#ffd166"];
  for(let i=0;i<3;i++){x.fillStyle=gem[i];
   const a=-Math.PI/2+(i-1)*.85, gx=cx+Math.cos(a)*R*.66, gy=cy+Math.sin(a)*R*.66-R*.1;
   x.beginPath(); x.arc(gx,gy,R*.11,0,7); x.fill();
   x.strokeStyle="#0008"; x.lineWidth=.8; x.stroke();}}
 // level numeral
 x.fillStyle="#0b0e14"; x.font="900 "+Math.round(R*.62)+"px system-ui,sans-serif";
 x.textAlign="center"; x.textBaseline="middle";
 x.fillText(String(level),cx,cy+R*.02);
 x.fillStyle=C[1]; x.fillText(String(level),cx,cy+R*.02-1);
 x.textBaseline="alphabetic";}
